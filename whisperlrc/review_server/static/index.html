<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WhisperLRC 人工校对</title>
  <style>
    :root {
      --bg: #0b1014;
      --bg-soft: #0f151b;
      --panel: #141c24;
      --panel-2: #17212b;
      --line: #243341;
      --line-2: #2d3d4c;
      --text: #dde6ef;
      --muted: #8ea0b1;
      --accent: #14b8a6;
      --warn: #f59e0b;
      --danger: #ef4444;
      --ok: #22c55e;
      --selected: #1f2f3d;
      --selected-multi: #2a3f52;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at 16% 6%, #17232f 0%, transparent 32%),
                  radial-gradient(circle at 92% 18%, #122028 0%, transparent 35%),
                  var(--bg);
      color: var(--text);
      font-family: "Noto Sans SC", "Microsoft YaHei UI", "PingFang SC", sans-serif;
    }
    .layout {
      min-height: 100%;
      display: grid;
      grid-template-columns: 340px 1fr;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(12, 17, 22, 0.75);
      backdrop-filter: blur(4px);
      padding: 14px;
      overflow: auto;
    }
    .main {
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-height: 0;
      overflow: hidden;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      padding: 12px;
      min-height: 0;
    }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .muted {
      color: var(--muted);
      font-size: 12px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .row.top-actions {
      justify-content: flex-end;
    }
    input, select, textarea, button {
      border: 1px solid var(--line-2);
      background: #0f171f;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    input, select, textarea {
      width: 100%;
    }
    textarea {
      min-height: 70px;
      resize: vertical;
    }
    button {
      cursor: pointer;
      transition: all 0.14s ease;
    }
    button:hover {
      border-color: #3a5268;
      transform: translateY(-1px);
    }
    button.primary {
      border-color: #0d9488;
      background: #0f766e;
      color: #eafffb;
    }
    .status-pill {
      border: 1px solid var(--line-2);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--muted);
      background: #101922;
      white-space: nowrap;
    }
    .task-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .task {
      border: 1px solid var(--line-2);
      border-radius: 9px;
      background: #101821;
      padding: 9px;
      cursor: pointer;
    }
    .task:hover {
      border-color: #3d566c;
    }
    .task.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(20,184,166,0.35) inset;
      background: #10212a;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 12px;
      min-height: 0;
    }
    .sentence-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f171f;
      max-height: calc(100vh - 320px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 9px;
      border-bottom: 1px solid #1d2a36;
      vertical-align: top;
    }
    th {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .subtitle-ja {
      font-size: 16px;
      line-height: 1.6;
      font-weight: 600;
      word-break: break-word;
    }
    .subtitle-zh {
      margin-top: 6px;
      font-size: 16px;
      line-height: 1.6;
      color: var(--muted);
      word-break: break-word;
    }
    .subtitle-cell {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .conf-row {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      align-items: flex-end;
    }
    .conf-token {
      display: inline-flex;
      align-items: flex-end;
      padding: 0 1px 1px 1px;
      border-bottom: 2px solid var(--conf-color, #6f8192);
      white-space: pre;
      line-height: 1.2;
      color: #d6e4f2;
      font-size: 13px;
    }
    tbody tr {
      cursor: pointer;
      transition: background 0.12s ease;
    }
    tbody tr:hover {
      background: #13202b;
    }
    tbody tr.sel {
      background: var(--selected);
    }
    tbody tr.multi-sel {
      background: var(--selected-multi);
    }
    tbody tr.active {
      background: rgba(255, 255, 255, 0.08);
    }
    tbody tr.sel.active {
      background: #274155;
    }
    .ops {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }
    .op-btn {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 6px;
      background: #15202b;
    }
    .op-btn.danger {
      border-color: #6a2323;
      color: #ffb4b4;
    }
    .timeline-note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    #timelineCanvas {
      width: 100%;
      height: 148px;
      border: 1px solid var(--line-2);
      border-radius: 10px;
      background: #0c131a;
      display: block;
      cursor: crosshair;
    }
    .transport {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .time-label {
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      color: var(--muted);
      min-width: 150px;
    }
    .gain-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 240px;
    }
    .gain-wrap input[type="range"] {
      flex: 1;
      min-width: 120px;
    }
    .gain-val {
      min-width: 48px;
      text-align: right;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      color: var(--muted);
    }
    .hidden-audio {
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
      position: absolute;
    }
    .panel-grid {
      display: grid;
      gap: 8px;
    }
    .hidden {
      display: none !important;
    }
    .editor-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .dirty-pill {
      border: 1px solid #8b5a10;
      border-radius: 999px;
      color: #ffd68a;
      background: #3b2b12;
      padding: 2px 8px;
      font-size: 12px;
      white-space: nowrap;
    }
    .progress-toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: min(420px, calc(100vw - 32px));
      border: 1px solid var(--line-2);
      border-radius: 10px;
      background: rgba(15, 23, 31, 0.96);
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.45);
      padding: 10px;
      z-index: 50;
    }
    .progress-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 9px;
      border: 1px solid var(--line-2);
      border-radius: 999px;
      overflow: hidden;
      background: #0e141b;
      margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0ea5a3 0%, #22c55e 100%);
      transition: width 0.18s ease;
    }
    .progress-meta {
      font-size: 12px;
      color: var(--muted);
      font-family: Consolas, "Courier New", monospace;
    }
    .time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .mono { font-family: Consolas, "Courier New", monospace; }
    .small {
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .split {
        grid-template-columns: 1fr;
      }
      .sentence-wrap {
        max-height: 42vh;
      }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="head">
      <div class="title">人工校对任务</div>
      <button id="refreshTasks">刷新</button>
    </div>
    <input id="taskFilter" placeholder="按文件名过滤..." />
    <div id="taskList" class="task-list"></div>
  </aside>

  <main class="main">
    <section class="card">
      <div class="head">
        <div>
          <div id="taskTitle" class="title">未选择任务</div>
          <div id="taskMeta" class="muted"></div>
        </div>
        <div class="row top-actions">
          <select id="taskStatus">
            <option value="todo">todo</option>
            <option value="in_review">in_review</option>
            <option value="done">done</option>
            <option value="partial">partial</option>
            <option value="failed">failed</option>
          </select>
          <span id="dirtyBadge" class="dirty-pill hidden">未保存</span>
          <button id="saveTaskFile" class="primary">保存文件 (Ctrl+S)</button>
          <button id="exportZh" class="primary">导出ZH</button>
          <button id="exportBoth">导出JA+ZH</button>
        </div>
      </div>
      <div class="transport">
        <button id="playPauseBtn" class="primary">播放</button>
        <span id="timeLabel" class="time-label">00:00.00 / 00:00.00</span>
        <div class="gain-wrap">
          <span class="small">波形增益</span>
          <input id="waveGain" type="range" min="0.20" max="6.00" step="0.05" value="1.00" />
          <span id="waveGainVal" class="gain-val">1.00x</span>
        </div>
      </div>
      <audio id="audioPlayer" class="hidden-audio" preload="auto"></audio>
      <canvas id="timelineCanvas"></canvas>
      <div class="timeline-note">
        波形即进度条：点击/拖动可跳转播放位置；白线为播放位置，紫色覆盖为播放字幕区间，白色覆盖为选中字幕区间，青色为字幕起止锚点。支持拖动锚点/白色区间与 Ctrl+滚轮缩放，按住 Shift 微调拖动。
      </div>
    </section>

    <section class="split">
      <div class="card sentence-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:130px;">时间</th>
              <th>内容</th>
              <th style="width:90px;">校对</th>
              <th style="width:140px;">操作</th>
            </tr>
          </thead>
          <tbody id="sentenceBody"></tbody>
        </table>
      </div>

      <div class="card">
        <div class="head">
          <div class="title">句子编辑</div>
          <span id="sentenceId" class="status-pill">未选择</span>
        </div>
        <div class="panel-grid">
          <div id="multiHint" class="small hidden"></div>

          <div id="singleEditor" class="panel-grid">
            <label>日语</label>
            <textarea id="editJa" placeholder="输入日语文本"></textarea>
            <label>中文</label>
            <textarea id="editZh" placeholder="输入中文文本"></textarea>
            <div class="time-grid">
              <div>
                <label>起始秒 start_sec</label>
                <input id="editStart" type="number" step="0.001" min="0" />
              </div>
              <div>
                <label>结束秒 end_sec</label>
                <input id="editEnd" type="number" step="0.001" min="0" />
              </div>
            </div>
            <div class="small">可在此精确输入时间；时间轴拖动默认灵敏，按住 Shift 可微调。</div>
          </div>

          <div class="editor-actions">
            <button id="actRelisten">重新识别</button>
            <button id="actAutoTranslate">自动翻译</button>
            <button id="actRetranslate" class="primary">一键重翻</button>
          </div>
          <div id="message" class="small mono"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<div id="progressToast" class="progress-toast hidden">
  <div id="progressTitle" class="progress-title">处理中</div>
  <div class="progress-bar">
    <div id="progressFill" class="progress-fill"></div>
  </div>
  <div id="progressMeta" class="progress-meta"></div>
</div>

<script>
  const EPS = 0.001;
  const DRAG_SENSITIVITY_NORMAL = 1.0;
  const DRAG_SENSITIVITY_FINE = 0.10;
  const CLICK_DRAG_THRESHOLD_PX = 4;
  const MIN_VIEW_SPAN_SEC = 1.0;

  const state = {
    tasks: [],
    currentTaskId: "",
    currentTask: null,
    currentSentenceId: "",
    selectedSentenceIds: new Set(),
    selectionAnchorIndex: -1,
    activeSentenceId: "",
    dirty: false,
    actionRunning: false,
    progressHideTimer: 0,
    audioCtx: null,
    audioSourceNode: null,
    audioGainNode: null,
    audioBuffer: null,
    audioDurationSec: 0,
    audioNormGain: 1.0,
    waveformNormGain: 1.0,
    waveformUserGain: 1.0,
    viewStartSec: 0,
    viewEndSec: 0,
    drag: null,
    drawRaf: 0,
    playLoopRaf: 0,
    lastCanvasW: 0,
    lastCanvasH: 0,
    audioDecodeToken: 0,
  };

  const el = (id) => document.getElementById(id);

  function setMsg(text, isError = false) {
    const node = el("message");
    node.textContent = text || "";
    node.style.color = isError ? "#ef4444" : "#8ea0b1";
  }

  function setDirty(v) {
    state.dirty = Boolean(v);
    el("dirtyBadge").classList.toggle("hidden", !state.dirty);
    updateTaskMeta();
  }

  function markDirty() {
    setDirty(true);
    updateTaskMeta();
  }

  function updateTaskMeta() {
    if (!state.currentTask) {
      el("taskMeta").textContent = "";
      return;
    }
    const statusText = state.dirty ? "未保存修改" : String(state.currentTask.status || "todo");
    el("taskMeta").textContent = `状态: ${statusText} | 句子: ${getSentences().length}`;
  }

  function showProgress(title, total) {
    if (state.progressHideTimer) {
      clearTimeout(state.progressHideTimer);
      state.progressHideTimer = 0;
    }
    el("progressTitle").textContent = title || "处理中";
    el("progressFill").style.width = "0%";
    el("progressMeta").textContent = `0/${Math.max(1, Number(total || 1))}`;
    el("progressToast").classList.remove("hidden");
  }

  function updateProgress(current, total, detail = "") {
    const safeTotal = Math.max(1, Number(total || 1));
    const safeCurrent = clamp(Number(current || 0), 0, safeTotal);
    const pct = (safeCurrent / safeTotal) * 100;
    el("progressFill").style.width = `${pct.toFixed(1)}%`;
    el("progressMeta").textContent = `${safeCurrent}/${safeTotal}${detail ? ` | ${detail}` : ""}`;
  }

  function finishProgress(detail, isError = false) {
    el("progressMeta").textContent = detail || (isError ? "失败" : "完成");
    if (!isError) {
      el("progressFill").style.width = "100%";
    }
    if (state.progressHideTimer) {
      clearTimeout(state.progressHideTimer);
    }
    state.progressHideTimer = setTimeout(() => {
      el("progressToast").classList.add("hidden");
      state.progressHideTimer = 0;
    }, isError ? 2500 : 1200);
  }

  async function api(url, options = {}) {
    let res;
    try {
      res = await fetch(url, options);
    } catch (e) {
      throw new Error(`请求失败（服务可能已退出）：${e}`);
    }
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      const detail = data && data.detail ? data.detail : res.statusText;
      throw new Error(detail || "请求失败");
    }
    return data;
  }

  function fmtSec(sec) {
    const n = Number(sec || 0);
    const m = Math.floor(n / 60).toString().padStart(2, "0");
    const s = (n % 60).toFixed(2).padStart(5, "0");
    return `${m}:${s}`;
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function escapeHtml(text) {
    const s = String(text || "");
    return s
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll("\"", "&quot;")
      .replaceAll("'", "&#39;");
  }

  function confidenceToColor(conf) {
    if (!Number.isFinite(conf)) return "#6f8192";
    const v = clamp(Number(conf), 0, 1);
    const h = Math.round(v * 120);
    return `hsl(${h} 78% 48%)`;
  }

  function buildJaWithConfidenceHtml(sentence, fallbackJa) {
    const words = Array.isArray(sentence.word_items) ? sentence.word_items : [];
    const items = [];
    for (const w of words) {
      if (!w || typeof w !== "object") continue;
      const text = String(w.word || w.text || w.token || w.token_text || "");
      if (!text) continue;
      const confRaw = (w.confidence ?? w.conf ?? w.probability ?? w.prob);
      const conf = Number(confRaw);
      const color = confidenceToColor(conf);
      const title = Number.isFinite(conf) ? `置信度 ${conf.toFixed(3)}` : "无置信度";
      items.push(`<span class="conf-token" style="--conf-color:${color}" title="${title}">${escapeHtml(text)}</span>`);
    }
    if (!items.length) {
      return `<div class="subtitle-ja">${escapeHtml(fallbackJa)}</div>`;
    }
    return `<div class="subtitle-ja conf-row">${items.join("")}</div>`;
  }

  function almostEqual(a, b) {
    return Math.abs(Number(a) - Number(b)) <= EPS;
  }

  function getSentences() {
    if (!state.currentTask || !Array.isArray(state.currentTask.sentences)) return [];
    return state.currentTask.sentences;
  }

  function getSentenceDisplayJa(s) {
    return String((s && (s.review_text_ja || s.ja_text)) || "");
  }

  function getSentenceDisplayZh(s) {
    return String((s && (s.review_text_zh || s.zh_text)) || "");
  }

  function normalizeTask(task) {
    const t = (task && typeof task === "object") ? task : {};
    const sentencesRaw = Array.isArray(t.sentences) ? t.sentences : [];
    const sentences = sentencesRaw.map((s, i) => ({
      sentence_id: String((s && s.sentence_id) || `s_${String(i + 1).padStart(4, "0")}`),
      start_sec: Number((s && s.start_sec) || 0),
      end_sec: Number((s && s.end_sec) || 0),
      ja_text: String((s && s.ja_text) || ""),
      zh_text: String((s && s.zh_text) || ""),
      review_text_ja: String((s && s.review_text_ja) || ""),
      review_text_zh: String((s && s.review_text_zh) || ""),
      review_state: String((s && s.review_state) || "pending"),
      translation_status: String((s && s.translation_status) || ""),
      segment_confidence: (s && s.segment_confidence) == null ? null : Number(s.segment_confidence),
      word_items: Array.isArray(s && s.word_items) ? s.word_items : [],
    }));
    return {
      ...t,
      status: String(t.status || "todo"),
      sentences,
    };
  }

  function getSentenceIndexById(sentenceId) {
    return getSentences().findIndex(s => String(s.sentence_id || "") === String(sentenceId || ""));
  }

  function getSelectedIdsOrdered() {
    const out = [];
    for (const s of getSentences()) {
      const sid = String(s.sentence_id || "");
      if (state.selectedSentenceIds.has(sid)) out.push(sid);
    }
    return out;
  }

  function getSelectionSegments(ids) {
    if (!ids.length) return [];
    const indexMap = new Map();
    const arr = getSentences();
    for (let i = 0; i < arr.length; i += 1) {
      indexMap.set(String(arr[i].sentence_id || ""), i);
    }
    const sorted = ids.slice().sort((a, b) => (indexMap.get(a) ?? 1e9) - (indexMap.get(b) ?? 1e9));
    const segments = [];
    let cur = [];
    for (const sid of sorted) {
      if (!cur.length) {
        cur = [sid];
        continue;
      }
      const prev = cur[cur.length - 1];
      const prevIdx = indexMap.get(prev);
      const idx = indexMap.get(sid);
      if (prevIdx != null && idx != null && idx === prevIdx + 1) {
        cur.push(sid);
      } else {
        segments.push(cur);
        cur = [sid];
      }
    }
    if (cur.length) segments.push(cur);
    return segments;
  }

  function buildDraftSentence(s) {
    return {
      sentence_id: String(s.sentence_id || ""),
      start_sec: Number(s.start_sec || 0),
      end_sec: Number(s.end_sec || 0),
      ja_text: String(s.ja_text || ""),
      zh_text: String(s.zh_text || ""),
      review_text_ja: String(s.review_text_ja || ""),
      review_text_zh: String(s.review_text_zh || ""),
      review_state: String(s.review_state || "pending"),
      translation_status: String(s.translation_status || ""),
      segment_confidence: s.segment_confidence == null ? null : Number(s.segment_confidence),
      word_items: Array.isArray(s.word_items) ? s.word_items : [],
    };
  }

  function buildSavePayload() {
    return {
      status: String(el("taskStatus").value || (state.currentTask ? state.currentTask.status : "todo")),
      sentences: getSentences().map(s => buildDraftSentence(s)),
    };
  }

  function renderTasks() {
    const list = el("taskList");
    const keyword = (el("taskFilter").value || "").trim().toLowerCase();
    list.innerHTML = "";

    for (const t of state.tasks) {
      const name = String(t.file_id || t.task_id || "");
      const id = String(t.task_id || "");
      const hit = !keyword || name.toLowerCase().includes(keyword) || id.toLowerCase().includes(keyword);
      if (!hit) continue;

      const node = document.createElement("div");
      node.className = "task" + (state.currentTaskId === t.task_id ? " active" : "");
      node.innerHTML = `
        <div class="row" style="justify-content:space-between">
          <strong>${name}</strong>
          <span class="status-pill">${t.status || "todo"}</span>
        </div>
        <div class="muted">句子 ${t.reviewed_sentences || 0}/${t.total_sentences || 0} · 风险 ${t.risk_count || 0}</div>
        <div class="muted">${id}</div>
      `;
      node.onclick = () => openTask(t.task_id).catch(e => setMsg(String(e), true));
      list.appendChild(node);
    }
  }

  function applyAudioSource(taskId) {
    const audio = el("audioPlayer");
    audio.pause();
    audio.currentTime = 0;
    audio.src = `/api/tasks/${encodeURIComponent(taskId)}/audio?ts=${Date.now()}`;
    syncTransportUI();
  }

  async function ensureAudioContext() {
    if (state.audioCtx) return state.audioCtx;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) throw new Error("浏览器不支持 WebAudio");
    state.audioCtx = new Ctx();
    return state.audioCtx;
  }

  async function ensureAudioGraph() {
    await ensureAudioContext();
    if (state.audioSourceNode && state.audioGainNode) return;
    const audio = el("audioPlayer");
    state.audioSourceNode = state.audioCtx.createMediaElementSource(audio);
    state.audioGainNode = state.audioCtx.createGain();
    state.audioSourceNode.connect(state.audioGainNode);
    state.audioGainNode.connect(state.audioCtx.destination);
    state.audioGainNode.gain.value = state.audioNormGain;
  }

  function applyAudioGain() {
    if (!state.audioGainNode) return;
    state.audioGainNode.gain.value = state.audioNormGain;
  }

  function computeNormalization(buffer) {
    const channels = Math.max(1, Number(buffer.numberOfChannels || 1));
    const sampleCount = Math.max(1, Number(buffer.length || 1));
    const stride = sampleCount > 1_000_000 ? 8 : 4;
    let peak = 0;
    let sumSq = 0;
    let count = 0;

    for (let ch = 0; ch < channels; ch += 1) {
      const data = buffer.getChannelData(ch);
      for (let i = 0; i < data.length; i += stride) {
        const v = Math.abs(data[i] || 0);
        if (v > peak) peak = v;
        sumSq += v * v;
        count += 1;
      }
    }
    const rms = count > 0 ? Math.sqrt(sumSq / count) : 0;
    const refPeak = Math.max(peak * 0.75, rms * 3.2, 0.0001);
    const audioGain = clamp(0.92 / Math.max(peak, 0.0001), 0.35, 8.0);
    const waveGain = clamp(0.82 / refPeak, 0.35, 12.0);
    return {peak, rms, audioGain, waveGain};
  }

  function syncTransportUI() {
    const audio = el("audioPlayer");
    const dur = Number(state.audioDurationSec || audio.duration || 0);
    el("playPauseBtn").textContent = audio.paused ? "播放" : "暂停";
    el("timeLabel").textContent = `${fmtSec(audio.currentTime || 0)} / ${fmtSec(dur)}`;
    el("waveGainVal").textContent = `${state.waveformUserGain.toFixed(2)}x`;
  }

  async function togglePlayPause() {
    const audio = el("audioPlayer");
    try {
      const ctx = await ensureAudioContext();
      await ensureAudioGraph();
      if (ctx.state === "suspended") {
        await ctx.resume();
      }
      if (audio.paused) {
        await audio.play();
      } else {
        audio.pause();
      }
      syncTransportUI();
    } catch (e) {
      setMsg(`播放失败：${e}`, true);
    }
    requestDraw();
  }

  async function decodeAudioForTask(taskId) {
    const token = ++state.audioDecodeToken;
    const url = `/api/tasks/${encodeURIComponent(taskId)}/audio?raw=1&ts=${Date.now()}`;
    try {
      const ctx = await ensureAudioContext();
      await ensureAudioGraph();
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`加载音频失败: ${resp.status}`);
      const buffer = await resp.arrayBuffer();
      const decoded = await ctx.decodeAudioData(buffer.slice(0));
      if (token !== state.audioDecodeToken) return;
      state.audioBuffer = decoded;
      state.audioDurationSec = Number(decoded.duration || 0);
      const normalized = computeNormalization(decoded);
      state.audioNormGain = normalized.audioGain;
      state.waveformNormGain = normalized.waveGain;
      applyAudioGain();
      if (state.audioDurationSec > 0) {
        state.viewStartSec = 0;
        state.viewEndSec = state.audioDurationSec;
      }
      syncTransportUI();
      setMsg(
        `音频已加载，时长 ${fmtSec(state.audioDurationSec)}，音频增益 ${state.audioNormGain.toFixed(2)}x，波形归一化 ${state.waveformNormGain.toFixed(2)}x`
      );
    } catch (e) {
      if (token !== state.audioDecodeToken) return;
      state.audioBuffer = null;
      state.audioDurationSec = 0;
      state.audioNormGain = 1.0;
      state.waveformNormGain = 1.0;
      applyAudioGain();
      syncTransportUI();
      setMsg(`音频波形不可用：${e}`, true);
    }
    requestDraw();
  }

  function getSelectedSentence() {
    const arr = getSentences();
    return arr.find(s => s.sentence_id === state.currentSentenceId) || null;
  }

  function getActiveSentence() {
    const arr = getSentences();
    return arr.find(s => s.sentence_id === state.activeSentenceId) || null;
  }

  function findActiveSentenceIdByTime(sec) {
    const arr = getSentences();
    if (!arr.length) return "";
    for (let i = 0; i < arr.length; i += 1) {
      const s = arr[i];
      const start = Number(s.start_sec || 0);
      const end = Number(s.end_sec || 0);
      if (sec + EPS >= start && sec < end) return s.sentence_id;
    }
    const last = arr[arr.length - 1];
    if (last && sec + EPS >= Number(last.start_sec || 0) && sec <= Number(last.end_sec || 0) + EPS) {
      return last.sentence_id;
    }
    return "";
  }

  function refreshActiveSentence() {
    const audio = el("audioPlayer");
    const nextId = findActiveSentenceIdByTime(Number(audio.currentTime || 0));
    if (nextId === state.activeSentenceId) return false;
    state.activeSentenceId = nextId;
    return true;
  }

  function updateEditorBySelected() {
    const selectedIds = getSelectedIdsOrdered();
    const isMulti = selectedIds.length > 1;
    el("singleEditor").classList.toggle("hidden", isMulti);
    el("multiHint").classList.toggle("hidden", !isMulti);
    if (isMulti) {
      el("sentenceId").textContent = `${selectedIds.length}句`;
      el("multiHint").textContent = `已多选 ${selectedIds.length} 句。右侧仅支持批量动作。`;
      return;
    }

    const s = getSelectedSentence();
    if (!s) {
      el("sentenceId").textContent = "未选择";
      el("editJa").value = "";
      el("editZh").value = "";
      el("editStart").value = "";
      el("editEnd").value = "";
      return;
    }
    el("sentenceId").textContent = s.sentence_id;
    el("editJa").value = getSentenceDisplayJa(s);

    el("editStart").value = Number(s.start_sec || 0).toFixed(3);
    el("editEnd").value = Number(s.end_sec || 0).toFixed(3);
  }

      `;

  function renderTaskHeader() {
    if (!state.currentTask) {
      el("taskTitle").textContent = "未选择任务";
      el("taskMeta").textContent = "";
      return;
    }
    const t = state.currentTask;
    el("taskTitle").textContent = `${t.file_id} (${t.task_id})`;
    el("taskStatus").value = t.status || "todo";
    updateTaskMeta();
  }

  function ensureViewWindow() {
    const dur = Number(state.audioDurationSec || 0);
    if (dur <= 0) {
      state.viewStartSec = 0;
      state.viewEndSec = 1;
      return;
    }
    let span = state.viewEndSec - state.viewStartSec;
    if (!(span > 0)) {
      state.viewStartSec = 0;
      state.viewEndSec = dur;
      span = dur;
    }
    span = clamp(span, MIN_VIEW_SPAN_SEC, dur);
    state.viewStartSec = clamp(state.viewStartSec, 0, Math.max(0, dur - span));
    state.viewEndSec = state.viewStartSec + span;
  }

  function ensureTimeVisibleCentered(sec) {
    ensureViewWindow();
    if (sec >= state.viewStartSec && sec <= state.viewEndSec) return false;
    const dur = Number(state.audioDurationSec || 0);
    if (!(dur > 0)) return false;
    const span = Math.max(MIN_VIEW_SPAN_SEC, state.viewEndSec - state.viewStartSec);
    let start = sec - span / 2;
    start = clamp(start, 0, Math.max(0, dur - span));
    state.viewStartSec = start;
    state.viewEndSec = start + span;
    return true;
  }

  function buildAnchors(sentences) {
    const anchors = [];
    if (!sentences.length) return anchors;
    const n = sentences.length;
    for (let b = 0; b <= n; b += 1) {
      if (b === 0) {
        anchors.push({
          key: "b-0",
          sec: Number(sentences[0].start_sec || 0),
          refs: [{idx: 0, kind: "start"}],
        });
      } else if (b === n) {
        anchors.push({
          key: `b-${n}`,
          sec: Number(sentences[n - 1].end_sec || 0),
          refs: [{idx: n - 1, kind: "end"}],
        });
      } else {
        const leftSec = Number(sentences[b - 1].end_sec || 0);
        const rightSec = Number(sentences[b].start_sec || 0);
        if (almostEqual(leftSec, rightSec)) {
          anchors.push({
            key: `j-${b}`,
            sec: (leftSec + rightSec) / 2,
            refs: [{idx: b - 1, kind: "end"}, {idx: b, kind: "start"}],
          });
        } else {
          anchors.push({
            key: `e-${b - 1}`,
            sec: leftSec,
            refs: [{idx: b - 1, kind: "end"}],
          });
          anchors.push({
            key: `s-${b}`,
            sec: rightSec,
            refs: [{idx: b, kind: "start"}],
          });
        }
      }
    }
    anchors.sort((a, b) => a.sec - b.sec);
    return anchors;
  }

  function getCanvas() {
    return el("timelineCanvas");
  }

  function getCanvasMetrics() {
    const canvas = getCanvas();
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const w = Math.max(1, Math.floor(rect.width * dpr));
    const h = Math.max(1, Math.floor(rect.height * dpr));
    if (canvas.width !== w || canvas.height !== h || w !== state.lastCanvasW || h !== state.lastCanvasH) {
      canvas.width = w;
      canvas.height = h;
      state.lastCanvasW = w;
      state.lastCanvasH = h;
    }
    return {canvas, rect, dpr, w, h};
  }

  function secToX(sec, rect) {
    const span = Math.max(0.0001, state.viewEndSec - state.viewStartSec);
    return ((sec - state.viewStartSec) / span) * rect.width;
  }

  function xToSec(x, rect) {
    const span = Math.max(0.0001, state.viewEndSec - state.viewStartSec);
    return state.viewStartSec + (x / rect.width) * span;
  }

  function drawWaveform(ctx, rect, dpr) {
    const buffer = state.audioBuffer;
    if (!buffer) {
      ctx.fillStyle = "#6b7c8d";
      ctx.font = `${12 * dpr}px sans-serif`;
      ctx.fillText("波形不可用", 12 * dpr, 20 * dpr);
      return;
    }
    const channels = buffer.numberOfChannels;
    const dataA = buffer.getChannelData(0);
    const dataB = channels > 1 ? buffer.getChannelData(1) : null;
    const sampleRate = buffer.sampleRate;
    const top = 10 * dpr;
    const h = rect.height * dpr - top * 2;
    const mid = top + h / 2;
    const pxCount = Math.max(1, Math.floor(rect.width));
    const startSample = Math.floor(state.viewStartSec * sampleRate);
    const endSample = Math.min(dataA.length, Math.ceil(state.viewEndSec * sampleRate));
    const range = Math.max(1, endSample - startSample);
    const samplesPerPx = Math.max(1, Math.floor(range / pxCount));
    const totalWaveGain = state.waveformNormGain * state.waveformUserGain;

    ctx.strokeStyle = "#2b3b49";
    ctx.lineWidth = 1 * dpr;
    ctx.beginPath();
    ctx.moveTo(0, mid);
    ctx.lineTo(rect.width * dpr, mid);
    ctx.stroke();

    ctx.strokeStyle = "#5a7084";
    ctx.lineWidth = 1 * dpr;
    for (let x = 0; x < pxCount; x += 1) {
      const from = startSample + x * samplesPerPx;
      const to = Math.min(endSample, from + samplesPerPx);
      let peak = 0;
      for (let i = from; i < to; i += 1) {
        let v = Math.abs(dataA[i] || 0);
        if (dataB) v = (v + Math.abs(dataB[i] || 0)) * 0.5;
        if (v > peak) peak = v;
      }
      const scaledPeak = clamp(peak * totalWaveGain, 0, 1.25);
      const hh = scaledPeak * h * 0.9;
      const xx = x * dpr;
      ctx.beginPath();
      ctx.moveTo(xx, mid - hh * 0.5);
      ctx.lineTo(xx, mid + hh * 0.5);
      ctx.stroke();
    }

    ctx.fillStyle = "#8297aa";
    ctx.font = `${11 * dpr}px monospace`;
    ctx.fillText(`${fmtSec(state.viewStartSec)} - ${fmtSec(state.viewEndSec)} / ${fmtSec(state.audioDurationSec)}`, 10 * dpr, (rect.height * dpr) - 8 * dpr);
  }

  function drawSelectedRangeOverlay(ctx, rect, dpr) {
    const selected = getSelectedSentence();
    if (!selected) return;
    const start = Number(selected.start_sec || 0);
    const end = Number(selected.end_sec || 0);
    if (!(end > start)) return;
    if (end < state.viewStartSec || start > state.viewEndSec) return;
    const visStart = clamp(start, state.viewStartSec, state.viewEndSec);
    const visEnd = clamp(end, state.viewStartSec, state.viewEndSec);
    const x1 = secToX(visStart, rect) * dpr;
    const x2 = secToX(visEnd, rect) * dpr;
    const width = Math.max(1, x2 - x1);
    ctx.fillStyle = "rgba(255, 255, 255, 0.14)";
    ctx.fillRect(x1, 0, width, rect.height * dpr);
  }

  function drawActiveRangeOverlay(ctx, rect, dpr) {
    const active = getActiveSentence();
    if (!active) return;
    const start = Number(active.start_sec || 0);
    const end = Number(active.end_sec || 0);
    if (!(end > start)) return;
    if (end < state.viewStartSec || start > state.viewEndSec) return;
    const visStart = clamp(start, state.viewStartSec, state.viewEndSec);
    const visEnd = clamp(end, state.viewStartSec, state.viewEndSec);
    const x1 = secToX(visStart, rect) * dpr;
    const x2 = secToX(visEnd, rect) * dpr;
    const width = Math.max(1, x2 - x1);
    ctx.fillStyle = "rgba(139, 92, 246, 0.26)";
    ctx.fillRect(x1, 0, width, rect.height * dpr);
  }

  function drawAnchors(ctx, rect, dpr, anchors) {
    const selectedIds = state.selectedSentenceIds;
    const arr = getSentences();

    for (const a of anchors) {
      if (a.sec < state.viewStartSec - EPS || a.sec > state.viewEndSec + EPS) continue;
      const x = secToX(a.sec, rect) * dpr;
      const shared = a.refs.length > 1;
      let isSelected = false;
      for (const r of a.refs) {
        const s = arr[r.idx];
        if (s && selectedIds.has(String(s.sentence_id || ""))) {
          isSelected = true;
          break;
        }
      }
      ctx.strokeStyle = isSelected ? "#22d3ee" : (shared ? "#14b8a6" : "#fbbf24");
      ctx.lineWidth = (isSelected ? 2.2 : 1.4) * dpr;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, rect.height * dpr);
      ctx.stroke();
    }
  }

  function drawPlayhead(ctx, rect, dpr) {
    const audio = el("audioPlayer");
    const t = Number(audio.currentTime || 0);
    if (t < state.viewStartSec || t > state.viewEndSec) return;
    const x = secToX(t, rect) * dpr;
    ctx.strokeStyle = "#e5eef8";
    ctx.lineWidth = 1.2 * dpr;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, rect.height * dpr);
    ctx.stroke();
  }

  function drawTimeline() {
    const {rect, dpr, w, h} = getCanvasMetrics();
    const ctx = getCanvas().getContext("2d");
    ensureViewWindow();

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#0c131a";
    ctx.fillRect(0, 0, w, h);

    drawWaveform(ctx, rect, dpr);
    drawSelectedRangeOverlay(ctx, rect, dpr);
    drawActiveRangeOverlay(ctx, rect, dpr);
    drawAnchors(ctx, rect, dpr, buildAnchors(getSentences()));
    drawPlayhead(ctx, rect, dpr);
    syncTransportUI();
  }

  function requestDraw() {
    if (state.drawRaf) return;
    state.drawRaf = requestAnimationFrame(() => {
      state.drawRaf = 0;
      drawTimeline();
    });
  }

  function seekTo(sec) {
    const audio = el("audioPlayer");
    const dur = Number(state.audioDurationSec || audio.duration || 0);
    if (!(dur > 0)) return;
    audio.currentTime = clamp(sec, 0, dur);
    requestDraw();
  }

  function seekByCanvasClientX(clientX) {
    const rect = getCanvas().getBoundingClientRect();
    const x = clamp(clientX - rect.left, 0, rect.width);
    const sec = xToSec(x, rect);
    seekTo(sec);
  }

  function selectSentence(sentenceId, opts = {}) {
    const arr = getSentences();
    const idx = arr.findIndex(s => String(s.sentence_id || "") === String(sentenceId || ""));
    if (idx < 0) return;

    if (opts.shiftKey && state.selectionAnchorIndex >= 0 && state.selectionAnchorIndex < arr.length) {
      const start = Math.min(state.selectionAnchorIndex, idx);
      const end = Math.max(state.selectionAnchorIndex, idx);
      const nextSet = new Set();
      for (let i = start; i <= end; i += 1) {
        nextSet.add(String(arr[i].sentence_id || ""));
      }
      state.selectedSentenceIds = nextSet;
      state.currentSentenceId = String(sentenceId);
    } else {
      state.currentSentenceId = String(sentenceId);
      state.selectedSentenceIds = new Set([String(sentenceId)]);
      state.selectionAnchorIndex = idx;
    }
    updateEditorBySelected();
    renderSentenceTable();
    requestDraw();

    if (opts.jumpAudio) {
      const s = getSelectedSentence();
      if (!s) return;
      const audio = el("audioPlayer");
      const wasPlaying = !audio.paused;
      const targetSec = Number(s.start_sec || 0);
      ensureTimeVisibleCentered(targetSec);
      audio.currentTime = targetSec;
      if (wasPlaying) {
        audio.play().catch(() => {});
      }
      requestDraw();
    }
  }

  async function loadTasks() {
    setMsg("加载任务中...");
    const data = await api("/api/tasks");
    state.tasks = data.tasks || [];
    renderTasks();
    setMsg(`任务数: ${state.tasks.length}`);
  }

  async function openTask(taskId) {
    if (state.dirty) {
      const ok = window.confirm("当前任务有未保存修改，切换任务会丢失草稿，是否继续？");
      if (!ok) return;
    }
    state.currentTaskId = taskId;
    state.currentSentenceId = "";
    state.selectedSentenceIds = new Set();
    state.selectionAnchorIndex = -1;
    state.activeSentenceId = "";
    setMsg("加载任务详情中...");
    state.currentTask = normalizeTask(await api(`/api/tasks/${encodeURIComponent(taskId)}`));
    setDirty(false);
    renderTasks();
    renderTaskHeader();
    renderSentenceTable();
    applyAudioSource(taskId);
    decodeAudioForTask(taskId).catch(e => setMsg(String(e), true));
    if (state.currentTask.sentences && state.currentTask.sentences.length > 0) {
      const firstId = String(state.currentTask.sentences[0].sentence_id || "");
      state.selectedSentenceIds = new Set([firstId]);
      state.currentSentenceId = firstId;
      state.selectionAnchorIndex = 0;
      updateEditorBySelected();
      renderSentenceTable();
      requestDraw();
    } else {
      updateEditorBySelected();
    }
    setMsg(`已打开 ${taskId}`);
  }

  async function saveTaskFile() {
    if (!state.currentTaskId || !state.currentTask) return;
    const payload = buildSavePayload();
    setMsg("保存文件中...");
    const nextTask = await api(`/api/tasks/${encodeURIComponent(state.currentTaskId)}`, {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    const preferred = state.currentSentenceId;
    state.currentTask = normalizeTask(nextTask);
    renderTaskHeader();
    renderTasks();
    const idx = preferred ? getSentenceIndexById(preferred) : -1;
    if (idx >= 0) {
      state.selectedSentenceIds = new Set([preferred]);
      state.currentSentenceId = preferred;
      state.selectionAnchorIndex = idx;
    } else if (getSentences().length > 0) {
      const firstId = String(getSentences()[0].sentence_id || "");
      state.selectedSentenceIds = new Set([firstId]);
      state.currentSentenceId = firstId;
      state.selectionAnchorIndex = 0;
    } else {
      state.selectedSentenceIds = new Set();
      state.currentSentenceId = "";
      state.selectionAnchorIndex = -1;
    }
    setDirty(false);
    updateEditorBySelected();
    renderSentenceTable();
    requestDraw();
    setMsg("保存成功");
  }

  async function exportTask(mode) {
    if (!state.currentTaskId) return;
    if (state.dirty) {
      setMsg("当前有未保存修改，导出将使用已保存版本。", true);
    }
    setMsg("导出中...");
    const payload = mode === "zh"
      ? {export_ja: false, export_zh: true}
      : {export_ja: true, export_zh: true};
    const data = await api(`/api/tasks/${encodeURIComponent(state.currentTaskId)}/export`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    const files = (data.exported_files || []).join(" | ");
    const warnings = (data.warnings || []).length;
    setMsg(`导出完成: ${files}${warnings ? ` | 警告 ${warnings}` : ""}`);
  }

  async function insertAfterSentence(sentenceId) {
    if (!state.currentTask) return;
    const arr = getSentences();
    const idx = arr.findIndex(s => String(s.sentence_id || "") === String(sentenceId || ""));
    if (idx < 0) return;
    const cur = arr[idx];
    const next = idx + 1 < arr.length ? arr[idx + 1] : null;
    const curStart = Number(cur.start_sec || 0);
    const curEnd = Math.max(Number(cur.end_sec || 0), curStart + 0.05);
    let newStart = curEnd;
    let newEnd = curEnd + 0.5;
    if (next) {
      const nextStart = Number(next.start_sec || curEnd);
      const gap = nextStart - curEnd;
      if (gap >= 0.5) {
        newStart = curEnd;
        newEnd = curEnd + 0.5;
      } else if (gap >= 0.05) {
        newStart = curEnd;
        newEnd = nextStart;
      } else {
        const boundary = (curEnd + nextStart) / 2;
        newStart = Math.max(curStart + 0.05, boundary - 0.05);
        newEnd = Math.max(newStart + 0.05, boundary + 0.05);
        cur.end_sec = newStart;
        next.start_sec = newEnd;
      }
    }
    newEnd = Math.max(newEnd, newStart + 0.05);

    let maxId = 0;
    for (const s of arr) {
      const sid = String(s.sentence_id || "");
      const m = /^s_(\d+)$/.exec(sid);
      if (!m) continue;
      const n = Number(m[1]);
      if (Number.isFinite(n) && n > maxId) maxId = n;
    }
    const insertedId = `s_${String(maxId + 1).padStart(4, "0")}`;
    arr.splice(idx + 1, 0, {
      sentence_id: insertedId,
      start_sec: newStart,
      end_sec: newEnd,
      ja_text: "",
      zh_text: "",
      review_text_ja: "",
      review_text_zh: "",
      review_state: "pending",
      translation_status: "",
      segment_confidence: null,
      word_items: [],
    });
    markDirty();
    updateEditorBySelected();
    renderSentenceTable();
    selectSentence(insertedId, {jumpAudio: true});
    setMsg("插入成功（草稿），请保存文件。");
  }

  async function deleteSentenceById(sentenceId) {
    if (!state.currentTask) return;
    const arr = getSentences();
    const idx = arr.findIndex(s => String(s.sentence_id || "") === sentenceId);
    if (idx < 0) return;
    if (arr.length <= 1) {
      setMsg("至少保留一条字幕，不能删除最后一条。", true);
      return;
    }
    let fallbackId = "";
    if (idx + 1 < arr.length) {
      fallbackId = String(arr[idx + 1].sentence_id || "");
    } else if (idx - 1 >= 0) {
      fallbackId = String(arr[idx - 1].sentence_id || "");
    }
    arr.splice(idx, 1);
    if (idx > 0 && idx < arr.length) {
      const prev = arr[idx - 1];
      const next = arr[idx];
      prev.end_sec = Math.max(Number(next.start_sec || 0), Number(prev.start_sec || 0) + 0.05);
    }
    markDirty();
    const hasFallback = getSentences().some(s => String(s.sentence_id || "") === fallbackId);
    if (hasFallback) selectSentence(fallbackId, {jumpAudio: false});
    else if (getSentences().length > 0) selectSentence(String(getSentences()[0].sentence_id || ""), {jumpAudio: false});
    else {
      state.currentSentenceId = "";
      state.selectedSentenceIds = new Set();
      updateEditorBySelected();
      requestDraw();
    }
    setMsg("删除成功（草稿），请保存文件。");
  }

  function findAnchorAtCanvasX(clientX) {
    const rect = getCanvas().getBoundingClientRect();
    const x = clientX - rect.left;
    const anchors = buildAnchors(getSentences());
    let best = null;
    let bestDist = 1e9;
    for (const a of anchors) {
      const ax = secToX(a.sec, rect);
      const d = Math.abs(ax - x);
      if (d < bestDist) {
        bestDist = d;
        best = a;
      }
    }
    if (!best || bestDist > 10) return null;
    return {anchor: best, rect};
  }

  function findSelectedRangeAtCanvasX(clientX) {
    const selected = getSelectedSentence();
    if (!selected) return null;
    const rect = getCanvas().getBoundingClientRect();
    const x = clientX - rect.left;
    const start = Number(selected.start_sec || 0);
    const end = Number(selected.end_sec || 0);
    if (!(end > start)) return null;
    if (end < state.viewStartSec || start > state.viewEndSec) return null;
    const visStart = clamp(start, state.viewStartSec, state.viewEndSec);
    const visEnd = clamp(end, state.viewStartSec, state.viewEndSec);
    if (!(visEnd > visStart)) return null;
    const x1 = secToX(visStart, rect);
    const x2 = secToX(visEnd, rect);
    if (x < x1 || x > x2) return null;
    const idx = getSentenceIndexById(selected.sentence_id);
    if (idx < 0) return null;
    return {idx, start, end};
  }

  function applyAnchorSecond(refs, sec) {
    const arr = getSentences();
    if (!arr.length) return {ok: false, touched: []};
    const before = arr.map(s => ({
      start: Number(s.start_sec || 0),
      end: Number(s.end_sec || 0),
    }));
    const oldVals = [];
    const touched = new Set();
    const saved = new Set();

    const setField = (idx, field, value) => {
      const s = arr[idx];
      if (!s) return;
      const key = `${idx}:${field}`;
      if (!saved.has(key)) {
        oldVals.push({idx, field, val: Number(s[field] || 0)});
        saved.add(key);
      }
      s[field] = value;
      touched.add(idx);
    };

    for (const r of refs) {
      if (r.kind === "start") setField(r.idx, "start_sec", sec);
      else setField(r.idx, "end_sec", sec);
    }

    for (const r of refs) {
      if (r.kind === "end") {
        const nextIdx = r.idx + 1;
        const next = arr[nextIdx];
        const prevEnd = before[r.idx] ? before[r.idx].end : null;
        const prevNextStart = before[nextIdx] ? before[nextIdx].start : null;
        if (next && prevEnd != null && prevNextStart != null
          && (sec + EPS >= prevNextStart || almostEqual(prevNextStart, prevEnd))) {
          setField(nextIdx, "start_sec", sec);
        }
      } else if (r.kind === "start") {
        const prevIdx = r.idx - 1;
        const prev = arr[prevIdx];
        const prevStart = before[r.idx] ? before[r.idx].start : null;
        const prevEnd = before[prevIdx] ? before[prevIdx].end : null;
        if (prev && prevStart != null && prevEnd != null
          && (sec <= prevEnd + EPS || almostEqual(prevEnd, prevStart))) {
          setField(prevIdx, "end_sec", sec);
        }
      }
    }

    for (const idx of touched) {
      const s = arr[idx];
      if (!s) continue;
      if (!(Number(s.end_sec) > Number(s.start_sec))) {
        for (const o of oldVals) {
          arr[o.idx][o.field] = o.val;
        }
        return {ok: false, touched: []};
      }
      if (Number(s.start_sec) < 0) {
        for (const o of oldVals) {
          arr[o.idx][o.field] = o.val;
        }
        return {ok: false, touched: []};
      }
    }
    return {ok: true, touched: Array.from(touched)};
  }

  function handleCanvasWheel(e) {
    const rect = getCanvas().getBoundingClientRect();
    const x = e.clientX - rect.left;
    const dur = Number(state.audioDurationSec || 0);
    if (dur <= 0) return;
    ensureViewWindow();
    const oldSpan = state.viewEndSec - state.viewStartSec;

    if (e.ctrlKey) {
      e.preventDefault();
      const focusSec = xToSec(x, rect);
      let newSpan = oldSpan * (e.deltaY < 0 ? 0.84 : 1.18);
      newSpan = clamp(newSpan, MIN_VIEW_SPAN_SEC, dur);
      const ratio = x / Math.max(1, rect.width);
      let newStart = focusSec - ratio * newSpan;
      newStart = clamp(newStart, 0, Math.max(0, dur - newSpan));
      state.viewStartSec = newStart;
      state.viewEndSec = newStart + newSpan;
      requestDraw();
      return;
    }

    e.preventDefault();
    const moveSec = (e.deltaY / 500) * oldSpan;
    let ns = state.viewStartSec + moveSec;
    ns = clamp(ns, 0, Math.max(0, dur - oldSpan));
    state.viewStartSec = ns;
    state.viewEndSec = ns + oldSpan;
    requestDraw();
  }

  function handleCanvasMouseDown(e) {
    e.preventDefault();
    const hit = findAnchorAtCanvasX(e.clientX);
    if (hit) {
      const dur = Number(state.audioDurationSec || 0);
      state.drag = {
        mode: "anchor",
        refs: hit.anchor.refs.map(r => ({idx: r.idx, kind: r.kind})),
        startX: e.clientX,
        initialSec: Number(hit.anchor.sec),
        dur,
        touched: [],
        moved: false,
      };
      return;
    }
    const seg = findSelectedRangeAtCanvasX(e.clientX);
    if (seg) {
      seekByCanvasClientX(e.clientX);
      state.drag = {
        mode: "segment",
        idx: seg.idx,
        startX: e.clientX,
        initialStart: seg.start,
        initialEnd: seg.end,
        dur: Number(state.audioDurationSec || el("audioPlayer").duration || 0),
        moved: false,
        changed: false,
      };
      return;
    }
    seekByCanvasClientX(e.clientX);
    state.drag = {mode: "seek", moved: false};
  }

  function handleCanvasMouseMove(e) {
    if (!state.drag) return;
    if (state.drag.mode === "seek") {
      seekByCanvasClientX(e.clientX);
      state.drag.moved = true;
      return;
    }
    const rect = getCanvas().getBoundingClientRect();
    const span = Math.max(0.0001, state.viewEndSec - state.viewStartSec);
    const secPerPx = span / Math.max(1, rect.width);
    const deltaPx = e.clientX - state.drag.startX;
    const sensitivity = e.shiftKey ? DRAG_SENSITIVITY_FINE : DRAG_SENSITIVITY_NORMAL;

    if (state.drag.mode === "anchor") {
      const deltaSec = deltaPx * secPerPx * sensitivity;
      const targetSec = clamp(state.drag.initialSec + deltaSec, 0, Math.max(0, state.drag.dur));
      const res = applyAnchorSecond(state.drag.refs, targetSec);
      if (!res.ok) return;
      state.drag.touched = res.touched;
      state.drag.moved = Math.abs(deltaPx) >= CLICK_DRAG_THRESHOLD_PX;
      updateEditorBySelected();
      renderSentenceTable();
      requestDraw();
      return;
    }

    if (state.drag.mode === "segment") {
      const arr = getSentences();
      const s = arr[state.drag.idx];
      if (!s) return;
      const rawDeltaSec = deltaPx * secPerPx * sensitivity;
      const minDelta = -Number(state.drag.initialStart || 0);
      let maxDelta = Number.POSITIVE_INFINITY;
      if (Number(state.drag.dur) > 0) {
        maxDelta = Number(state.drag.dur) - Number(state.drag.initialEnd || 0);
      }
      const deltaSec = clamp(rawDeltaSec, minDelta, maxDelta);
      const nextStart = Number(state.drag.initialStart || 0) + deltaSec;
      const nextEnd = Number(state.drag.initialEnd || 0) + deltaSec;
      s.start_sec = nextStart;
      s.end_sec = nextEnd;
      state.drag.moved = Math.abs(deltaPx) >= CLICK_DRAG_THRESHOLD_PX;
      state.drag.changed = Math.abs(deltaSec) > EPS;
      updateEditorBySelected();
      renderSentenceTable();
      requestDraw();
    }
  }

  async function handleCanvasMouseUp() {
    if (!state.drag) return;
    const drag = state.drag;
    state.drag = null;
    if (drag.mode === "seek") return;
    if (drag.mode === "segment") {
      if (!drag.moved || !drag.changed) return;
      markDirty();
      setMsg("时间戳已更新到草稿，请保存文件。");
      return;
    }
    if (!drag.moved || !drag.touched.length) return;
    markDirty();
    setMsg("时间戳已更新到草稿，请保存文件。");
  }

  function applyTimeInputsLocally() {
    const s = getSelectedSentence();
    if (!s) return false;
    const startSec = Number(el("editStart").value);
    const endSec = Number(el("editEnd").value);
    if (!Number.isFinite(startSec) || !Number.isFinite(endSec)) {
      setMsg("起止时间格式错误", true);
      return false;
    }
    if (startSec < 0 || endSec <= startSec) {
      setMsg("时间非法：需满足 0 <= start < end", true);
      return false;
    }
    s.start_sec = startSec;
    s.end_sec = endSec;
    renderSentenceTable();
    requestDraw();
    markDirty();
    return true;
  }

    s.review_text_zh = el("editZh").value;

  function getActionTargetIds() {
    const ids = getSelectedIdsOrdered();
    if (ids.length) return ids;

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function isTerminalJobStatus(status) {
    return status === "succeeded" || status === "partial_failed" || status === "failed" || status === "cancelled";
  }

  function jobStageLabel(stage) {
    if (stage === "queued") return "排队中";
    if (stage === "running") return "处理中";
    if (stage === "relisten") return "重识别";
    if (stage === "translate") return "翻译";
    if (stage === "retrying") return "重试中";
    if (stage === "cancelled") return "已取消";
    return "处理中";
  }

  function logJobConsole(message, extra = null) {
    const prefix = "[WhisperLRC Job]";
    const ts = new Date().toISOString();
    if (extra == null) {
      console.log(`${prefix} ${ts} ${message}`);
      return;
    }
    console.log(`${prefix} ${ts} ${message}`, extra);
  }

  function applyJobResultToDraft(result) {
    const arr = getSentences();
    const byId = new Map(arr.map(s => [String(s.sentence_id || ""), s]));
    const rawUpdates = (result && typeof result === "object") ? result.updates : null;
    const updates = (rawUpdates && typeof rawUpdates === "object") ? rawUpdates : {};
    const jaUpdates = Array.isArray(updates.ja) ? updates.ja : [];
    const zhUpdates = Array.isArray(updates.zh) ? updates.zh : [];
    let applied = 0;

    for (const item of jaUpdates) {
      if (!item || typeof item !== "object") continue;
      const sid = String(item.sentence_id || "");
      const s = byId.get(sid);
      if (!s) continue;
      const ja = String(item.ja_text || "");
      if (s.review_text_ja !== ja) {
        s.review_text_ja = ja;
        applied += 1;
      }
    }
    for (const item of zhUpdates) {
      if (!item || typeof item !== "object") continue;
      const sid = String(item.sentence_id || "");
      const s = byId.get(sid);
      if (!s) continue;
      const zh = String(item.zh_text || "");
      if (s.review_text_zh !== zh) {
        s.review_text_zh = zh;
        applied += 1;
      }
    }

    const successIds = Array.isArray(result && result.success_ids) ? result.success_ids.map(x => String(x || "")) : [];
    const failedIds = Array.isArray(result && result.failed_ids) ? result.failed_ids.map(x => String(x || "")) : [];
    return {
      ok: successIds.filter(Boolean).length,
      fail: failedIds.filter(Boolean).length,
      applied,
      errors: Array.isArray(result && result.errors) ? result.errors.map(x => String(x || "")) : [],
    };
  }

  async function waitForJobDone(taskId, jobId, fallbackTotal) {
    let latest = null;
    let lastStage = "";
    let lastDone = -1;
    let lastAttempt = -1;
    let lastErrCount = -1;
    let lastLogCount = -1;
    for (;;) {
      const data = await api(`/api/tasks/${encodeURIComponent(taskId)}/jobs/${encodeURIComponent(jobId)}`);
      latest = data;
      const prog = (data && typeof data.progress === "object") ? data.progress : {};
      const done = Number(prog.done || 0);
      const total = Math.max(1, Number(prog.total || fallbackTotal || 1));
      const stage = jobStageLabel(String(prog.stage || ""));
      const sid = String(prog.current_sentence_id || "");
      const attempt = Number(data.attempt || 0);
      const maxAttempts = Number(data.max_attempts || 0);
      const attemptErrors = Array.isArray(data.attempt_errors) ? data.attempt_errors.map(x => String(x || "")) : [];
      const jobLogs = Array.isArray(data.logs) ? data.logs.map(x => String(x || "")) : [];
      const attemptText = maxAttempts > 0 && attempt > 0 ? ` | 尝试 ${attempt}/${maxAttempts}` : "";
      const sidText = sid ? ` ${sid}` : "";
      updateProgress(done, total, `${stage}${sidText}${attemptText}`);
      if (stage !== lastStage || done !== lastDone || attempt !== lastAttempt) {
        logJobConsole(
          `轮询进度 job=${jobId} status=${String(data.status || "")} stage=${String(prog.stage || "")} done=${done}/${total} sid=${sid || "-"} attempt=${attempt}/${maxAttempts || 0}`
        );
        lastStage = stage;
        lastDone = done;
        lastAttempt = attempt;
      }
      if (attemptErrors.length !== lastErrCount) {
        const startErr = Math.max(0, lastErrCount);
        lastErrCount = attemptErrors.length;
        if (attemptErrors.length > 0) {
          logJobConsole(`任务错误历史 job=${jobId} count=${attemptErrors.length}`, attemptErrors);
          for (let i = startErr; i < attemptErrors.length; i += 1) {
            const errLine = String(attemptErrors[i] || "");
            if (errLine) logJobConsole(`任务错误详情 job=${jobId} #${i + 1}: ${errLine}`);
          }
        }
      }
      if (jobLogs.length !== lastLogCount) {
        const start = Math.max(0, lastLogCount);
        for (let i = start; i < jobLogs.length; i += 1) {
          const line = String(jobLogs[i] || "");
          if (line) logJobConsole(`任务内部日志 job=${jobId} #${i + 1}: ${line}`);
        }
        lastLogCount = jobLogs.length;
      }
      if (isTerminalJobStatus(String(data.status || ""))) {
        logJobConsole(`任务进入终态 job=${jobId} status=${String(data.status || "")}`, data);
        return latest;
      }
      await sleep(500);
    }
  }

  async function runBatchAction(kind) {
    if (!state.currentTaskId || !state.currentTask || state.actionRunning) return;
    const ids = getActionTargetIds();
    if (!ids.length) {
      setMsg("请先选择句子。", true);
      return;
    }
    const titleMap = {
      relisten: "重新识别",
      auto_translate: "自动翻译",
      retranslate: "一键重翻",
    };
    const total = kind === "retranslate" ? ids.length * 2 : ids.length;
    state.actionRunning = true;
    showProgress(titleMap[kind] || "处理中", total);
    try {
      logJobConsole(`准备提交任务 kind=${kind} total=${total} task=${state.currentTaskId}`, {sentence_ids: ids});
      const draftSentences = [];
      for (const sid of ids) {
        const idx = getSentenceIndexById(sid);
        if (idx >= 0) draftSentences.push(buildDraftSentence(getSentences()[idx]));
      }
      const created = await api(`/api/tasks/${encodeURIComponent(state.currentTaskId)}/jobs`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          kind,
          sentence_ids: ids,
          draft_sentences: draftSentences,
        }),
      });
      const jobId = String(created.job_id || "");
      if (!jobId) {
        throw new Error("任务创建失败：未返回 job_id");
      }
      logJobConsole(`任务创建成功 job=${jobId} kind=${kind}`, created);
      const finalJob = await waitForJobDone(state.currentTaskId, jobId, total);
      const status = String(finalJob.status || "");

      if (status === "succeeded" || status === "partial_failed") {
        const stat = applyJobResultToDraft(finalJob.result || {});
        if (stat.applied > 0) {
          markDirty();
        }
        updateEditorBySelected();
        renderSentenceTable();
        requestDraw();
        finishProgress(`完成 | 成功 ${stat.ok} | 失败 ${stat.fail}`, stat.fail > 0);
        const errHint = stat.errors.length ? ` | ${stat.errors.slice(0, 2).join(" ; ")}` : "";
        setMsg(`${titleMap[kind]}完成：成功 ${stat.ok}，失败 ${stat.fail}。请保存文件。${errHint}`, stat.fail > 0);
        logJobConsole(`任务完成 kind=${kind} status=${status} ok=${stat.ok} fail=${stat.fail} applied=${stat.applied}`, {
          errors: stat.errors,
          final_job: finalJob,
        });
      } else if (status === "cancelled") {
        finishProgress("已取消", true);
        setMsg(`${titleMap[kind]}已取消。`, true);
        logJobConsole(`任务取消 kind=${kind} job=${String(finalJob.job_id || "")}`, finalJob);
      } else {
        const errs = Array.isArray(finalJob.result && finalJob.result.errors) ? finalJob.result.errors.map(x => String(x || "")) : [];
        const errText = String(finalJob.error || errs.join(" ; ") || "后台任务失败");
        finishProgress(`失败 | ${errText}`, true);
        setMsg(`${titleMap[kind]}失败：${errText}`, true);
        logJobConsole(`任务失败 kind=${kind} job=${String(finalJob.job_id || "")} error=${errText}`, finalJob);
      }
    } catch (e) {
      finishProgress(`失败 | ${e}`, true);
      setMsg(`${titleMap[kind]}失败：${e}`, true);
      logJobConsole(`任务异常 kind=${kind}`, e);
    } finally {
      state.actionRunning = false;
    }
  }

  function attachCanvasEvents() {
    const canvas = getCanvas();
    canvas.addEventListener("wheel", handleCanvasWheel, {passive: false});
    canvas.addEventListener("mousedown", handleCanvasMouseDown);
    window.addEventListener("mousemove", handleCanvasMouseMove);
    window.addEventListener("mouseup", () => {
      handleCanvasMouseUp().catch(e => setMsg(String(e), true));
    });
  }

  function runAudioTick() {
    if (refreshActiveSentence()) {
      renderSentenceTable();
    }
    requestDraw();
  }

  function stopPlayLoop() {
    if (!state.playLoopRaf) return;
    cancelAnimationFrame(state.playLoopRaf);
    state.playLoopRaf = 0;
  }

  function startPlayLoop() {
    if (state.playLoopRaf) return;
    const audio = el("audioPlayer");
    const step = () => {
      state.playLoopRaf = 0;
      runAudioTick();
      if (!audio.paused && !audio.ended) {
        state.playLoopRaf = requestAnimationFrame(step);
      }
    };
    state.playLoopRaf = requestAnimationFrame(step);
  }

  function startDrawLoop() {
    const audio = el("audioPlayer");
    audio.addEventListener("timeupdate", runAudioTick);
    audio.addEventListener("seeked", runAudioTick);
    audio.addEventListener("play", startPlayLoop);
    audio.addEventListener("pause", () => {
      stopPlayLoop();
      runAudioTick();
    });
    audio.addEventListener("ended", () => {
      stopPlayLoop();
      runAudioTick();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopPlayLoop();
        return;
      }
      if (!audio.paused && !audio.ended) {
        startPlayLoop();
      }
    });
  }

  function isEditableTarget(node) {
    if (!(node instanceof Element)) return false;
    return Boolean(node.closest("input, textarea, [contenteditable=''], [contenteditable='true'], [contenteditable='plaintext-only']"));
  }

  el("refreshTasks").onclick = () => {
    if (state.dirty) {
      const ok = window.confirm("存在未保存修改，刷新任务列表将丢失草稿，是否继续？");
      if (!ok) return;
    }
    loadTasks().catch(e => setMsg(String(e), true));
  };
  el("taskFilter").oninput = () => renderTasks();
  el("saveTaskFile").onclick = () => saveTaskFile().catch(e => setMsg(String(e), true));
  el("exportZh").onclick = () => exportTask("zh").catch(e => setMsg(String(e), true));
  el("exportBoth").onclick = () => exportTask("both").catch(e => setMsg(String(e), true));
  el("playPauseBtn").onclick = () => {
    togglePlayPause().catch(e => setMsg(String(e), true));
  };
  el("waveGain").addEventListener("input", () => {
    const v = Number(el("waveGain").value);
    state.waveformUserGain = Number.isFinite(v) ? clamp(v, 0.2, 6.0) : 1.0;
    syncTransportUI();
    requestDraw();
  });
  el("taskStatus").addEventListener("change", () => {
    if (!state.currentTask) return;
    state.currentTask.status = String(el("taskStatus").value || "todo");
    markDirty();
  });
  el("editJa").addEventListener("input", () => updateSelectedSentenceFromEditor());
  el("editZh").addEventListener("input", () => updateSelectedSentenceFromEditor());
  el("editStart").addEventListener("change", () => {
    if (applyTimeInputsLocally()) {
      setMsg("时间已更新到草稿，请保存文件。");
    }
  });
  el("editEnd").addEventListener("change", () => {
    if (applyTimeInputsLocally()) {
      setMsg("时间已更新到草稿，请保存文件。");
    }
  });
  el("actRelisten").onclick = () => runBatchAction("relisten").catch(e => setMsg(String(e), true));
  el("actAutoTranslate").onclick = () => runBatchAction("auto_translate").catch(e => setMsg(String(e), true));
  el("actRetranslate").onclick = () => runBatchAction("retranslate").catch(e => setMsg(String(e), true));
  document.addEventListener("keydown", (e) => {
    const k = String(e.key || "").toLowerCase();
    if (e.code === "Space" && !e.repeat && !e.ctrlKey && !e.metaKey && !e.altKey) {
      if (isEditableTarget(e.target)) return;
      e.preventDefault();
      togglePlayPause().catch(err => setMsg(String(err), true));
      return;
    }
    if ((e.ctrlKey || e.metaKey) && k === "s") {
      e.preventDefault();
      saveTaskFile().catch(err => setMsg(String(err), true));
    }
  });
  window.addEventListener("beforeunload", (e) => {
    if (!state.dirty) return;
    e.preventDefault();
    e.returnValue = "";
  });

  attachCanvasEvents();
  startDrawLoop();
  setDirty(false);
  syncTransportUI();
  loadTasks().catch(e => setMsg(String(e), true));
</script>
</body>
</html>

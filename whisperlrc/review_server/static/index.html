<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WhisperLRC 人工校对</title>
  <style>
    :root {
      --bg: #0b1014;
      --bg-soft: #0f151b;
      --panel: #141c24;
      --panel-2: #17212b;
      --line: #243341;
      --line-2: #2d3d4c;
      --text: #dde6ef;
      --muted: #8ea0b1;
      --accent: #14b8a6;
      --warn: #f59e0b;
      --danger: #ef4444;
      --ok: #22c55e;
      --selected: #1f2f3d;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at 16% 6%, #17232f 0%, transparent 32%),
                  radial-gradient(circle at 92% 18%, #122028 0%, transparent 35%),
                  var(--bg);
      color: var(--text);
      font-family: "Noto Sans SC", "Microsoft YaHei UI", "PingFang SC", sans-serif;
    }
    .layout {
      min-height: 100%;
      display: grid;
      grid-template-columns: 340px 1fr;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(12, 17, 22, 0.75);
      backdrop-filter: blur(4px);
      padding: 14px;
      overflow: auto;
    }
    .main {
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-height: 0;
      overflow: hidden;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      padding: 12px;
      min-height: 0;
    }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .muted {
      color: var(--muted);
      font-size: 12px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    input, select, textarea, button {
      border: 1px solid var(--line-2);
      background: #0f171f;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    input, select, textarea {
      width: 100%;
    }
    textarea {
      min-height: 70px;
      resize: vertical;
    }
    button {
      cursor: pointer;
      transition: all 0.14s ease;
    }
    button:hover {
      border-color: #3a5268;
      transform: translateY(-1px);
    }
    button.primary {
      border-color: #0d9488;
      background: #0f766e;
      color: #eafffb;
    }
    .status-pill {
      border: 1px solid var(--line-2);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      color: var(--muted);
      background: #101922;
      white-space: nowrap;
    }
    .task-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .task {
      border: 1px solid var(--line-2);
      border-radius: 9px;
      background: #101821;
      padding: 9px;
      cursor: pointer;
    }
    .task:hover {
      border-color: #3d566c;
    }
    .task.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(20,184,166,0.35) inset;
      background: #10212a;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 12px;
      min-height: 0;
    }
    .sentence-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f171f;
      max-height: calc(100vh - 320px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 9px;
      border-bottom: 1px solid #1d2a36;
      vertical-align: top;
    }
    tbody tr {
      cursor: pointer;
      transition: background 0.12s ease;
    }
    tbody tr:hover {
      background: #13202b;
    }
    tbody tr.sel {
      background: var(--selected);
    }
    .timeline-note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    #timelineCanvas {
      width: 100%;
      height: 148px;
      border: 1px solid var(--line-2);
      border-radius: 10px;
      background: #0c131a;
      display: block;
      cursor: crosshair;
    }
    .transport {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .time-label {
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      color: var(--muted);
      min-width: 150px;
    }
    .gain-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 240px;
    }
    .gain-wrap input[type="range"] {
      flex: 1;
      min-width: 120px;
    }
    .gain-val {
      min-width: 48px;
      text-align: right;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      color: var(--muted);
    }
    .hidden-audio {
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
      position: absolute;
    }
    .panel-grid {
      display: grid;
      gap: 8px;
    }
    .time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .mono { font-family: Consolas, "Courier New", monospace; }
    .small {
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .split {
        grid-template-columns: 1fr;
      }
      .sentence-wrap {
        max-height: 42vh;
      }
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="head">
      <div class="title">人工校对任务</div>
      <button id="refreshTasks">刷新</button>
    </div>
    <input id="taskFilter" placeholder="按文件名过滤..." />
    <div id="taskList" class="task-list"></div>
  </aside>

  <main class="main">
    <section class="card">
      <div class="head">
        <div>
          <div id="taskTitle" class="title">未选择任务</div>
          <div id="taskMeta" class="muted"></div>
        </div>
        <div class="row">
          <select id="taskStatus">
            <option value="todo">todo</option>
            <option value="in_review">in_review</option>
            <option value="done">done</option>
            <option value="partial">partial</option>
            <option value="failed">failed</option>
          </select>
          <button id="saveTaskStatus">更新状态</button>
          <button id="exportZh" class="primary">导出ZH</button>
          <button id="exportBoth">导出JA+ZH</button>
        </div>
      </div>
      <div class="transport">
        <button id="playPauseBtn" class="primary">播放</button>
        <span id="timeLabel" class="time-label">00:00.00 / 00:00.00</span>
        <div class="gain-wrap">
          <span class="small">波形增益</span>
          <input id="waveGain" type="range" min="0.20" max="6.00" step="0.05" value="1.00" />
          <span id="waveGainVal" class="gain-val">1.00x</span>
        </div>
      </div>
      <audio id="audioPlayer" class="hidden-audio" preload="auto"></audio>
      <canvas id="timelineCanvas"></canvas>
      <div class="timeline-note">
        波形即进度条：点击/拖动可跳转播放位置；白线为播放位置，青色为字幕起止锚点。支持拖动锚点与 Ctrl+滚轮缩放。
      </div>
    </section>

    <section class="split">
      <div class="card sentence-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:130px;">时间</th>
              <th>原文 / 译文</th>
              <th style="width:90px;">校对</th>
            </tr>
          </thead>
          <tbody id="sentenceBody"></tbody>
        </table>
      </div>

      <div class="card">
        <div class="head">
          <div class="title">句子编辑</div>
          <span id="sentenceId" class="status-pill">未选择</span>
        </div>
        <div class="panel-grid">
          <label>原文 JA</label>
          <textarea id="origJa" readonly></textarea>
          <label>机器译文 ZH</label>
          <textarea id="origZh" readonly></textarea>
          <div class="time-grid">
            <div>
              <label>起始秒 start_sec</label>
              <input id="editStart" type="number" step="0.001" min="0" />
            </div>
            <div>
              <label>结束秒 end_sec</label>
              <input id="editEnd" type="number" step="0.001" min="0" />
            </div>
          </div>
          <div class="small">可在此精确输入时间；时间轴拖动灵敏度较低用于微调。</div>
          <label>校对 JA</label>
          <textarea id="editJa" placeholder="可留空"></textarea>
          <label>校对 ZH</label>
          <textarea id="editZh" placeholder="可留空"></textarea>
          <label>校对状态</label>
          <select id="editState">
            <option value="pending">pending</option>
            <option value="accepted">accepted</option>
            <option value="needs_check">needs_check</option>
          </select>
          <div class="row">
            <button id="saveSentence" class="primary">保存句子</button>
          </div>
          <div id="message" class="small mono"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
  const EPS = 0.001;
  const DRAG_SENSITIVITY = 0.22;
  const MIN_VIEW_SPAN_SEC = 1.0;

  const state = {
    tasks: [],
    currentTaskId: "",
    currentTask: null,
    currentSentenceId: "",
    audioCtx: null,
    audioSourceNode: null,
    audioGainNode: null,
    audioBuffer: null,
    audioDurationSec: 0,
    audioNormGain: 1.0,
    waveformNormGain: 1.0,
    waveformUserGain: 1.0,
    viewStartSec: 0,
    viewEndSec: 0,
    drag: null,
    drawRaf: 0,
    lastCanvasW: 0,
    lastCanvasH: 0,
    audioDecodeToken: 0,
  };

  const el = (id) => document.getElementById(id);

  function setMsg(text, isError = false) {
    const node = el("message");
    node.textContent = text || "";
    node.style.color = isError ? "#ef4444" : "#8ea0b1";
  }

  async function api(url, options = {}) {
    const res = await fetch(url, options);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      const detail = data && data.detail ? data.detail : res.statusText;
      throw new Error(detail || "请求失败");
    }
    return data;
  }

  function fmtSec(sec) {
    const n = Number(sec || 0);
    const m = Math.floor(n / 60).toString().padStart(2, "0");
    const s = (n % 60).toFixed(2).padStart(5, "0");
    return `${m}:${s}`;
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function almostEqual(a, b) {
    return Math.abs(Number(a) - Number(b)) <= EPS;
  }

  function getSentences() {
    if (!state.currentTask || !Array.isArray(state.currentTask.sentences)) return [];
    return state.currentTask.sentences;
  }

  function renderTasks() {
    const list = el("taskList");
    const keyword = (el("taskFilter").value || "").trim().toLowerCase();
    list.innerHTML = "";

    for (const t of state.tasks) {
      const name = String(t.file_id || t.task_id || "");
      const id = String(t.task_id || "");
      const hit = !keyword || name.toLowerCase().includes(keyword) || id.toLowerCase().includes(keyword);
      if (!hit) continue;

      const node = document.createElement("div");
      node.className = "task" + (state.currentTaskId === t.task_id ? " active" : "");
      node.innerHTML = `
        <div class="row" style="justify-content:space-between">
          <strong>${name}</strong>
          <span class="status-pill">${t.status || "todo"}</span>
        </div>
        <div class="muted">句子 ${t.reviewed_sentences || 0}/${t.total_sentences || 0} · 风险 ${t.risk_count || 0}</div>
        <div class="muted">${id}</div>
      `;
      node.onclick = () => openTask(t.task_id).catch(e => setMsg(String(e), true));
      list.appendChild(node);
    }
  }

  function applyAudioSource(taskId) {
    const audio = el("audioPlayer");
    audio.pause();
    audio.currentTime = 0;
    audio.src = `/api/tasks/${encodeURIComponent(taskId)}/audio?ts=${Date.now()}`;
    syncTransportUI();
  }

  async function ensureAudioContext() {
    if (state.audioCtx) return state.audioCtx;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) throw new Error("浏览器不支持 WebAudio");
    state.audioCtx = new Ctx();
    return state.audioCtx;
  }

  async function ensureAudioGraph() {
    await ensureAudioContext();
    if (state.audioSourceNode && state.audioGainNode) return;
    const audio = el("audioPlayer");
    state.audioSourceNode = state.audioCtx.createMediaElementSource(audio);
    state.audioGainNode = state.audioCtx.createGain();
    state.audioSourceNode.connect(state.audioGainNode);
    state.audioGainNode.connect(state.audioCtx.destination);
    state.audioGainNode.gain.value = state.audioNormGain;
  }

  function applyAudioGain() {
    if (!state.audioGainNode) return;
    state.audioGainNode.gain.value = state.audioNormGain;
  }

  function computeNormalization(buffer) {
    const channels = Math.max(1, Number(buffer.numberOfChannels || 1));
    const sampleCount = Math.max(1, Number(buffer.length || 1));
    const stride = sampleCount > 1_000_000 ? 8 : 4;
    let peak = 0;
    let sumSq = 0;
    let count = 0;

    for (let ch = 0; ch < channels; ch += 1) {
      const data = buffer.getChannelData(ch);
      for (let i = 0; i < data.length; i += stride) {
        const v = Math.abs(data[i] || 0);
        if (v > peak) peak = v;
        sumSq += v * v;
        count += 1;
      }
    }
    const rms = count > 0 ? Math.sqrt(sumSq / count) : 0;
    const refPeak = Math.max(peak * 0.75, rms * 3.2, 0.0001);
    const audioGain = clamp(0.92 / Math.max(peak, 0.0001), 0.35, 8.0);
    const waveGain = clamp(0.82 / refPeak, 0.35, 12.0);
    return {peak, rms, audioGain, waveGain};
  }

  function syncTransportUI() {
    const audio = el("audioPlayer");
    const dur = Number(state.audioDurationSec || audio.duration || 0);
    el("playPauseBtn").textContent = audio.paused ? "播放" : "暂停";
    el("timeLabel").textContent = `${fmtSec(audio.currentTime || 0)} / ${fmtSec(dur)}`;
    el("waveGainVal").textContent = `${state.waveformUserGain.toFixed(2)}x`;
  }

  async function togglePlayPause() {
    const audio = el("audioPlayer");
    try {
      const ctx = await ensureAudioContext();
      await ensureAudioGraph();
      if (ctx.state === "suspended") {
        await ctx.resume();
      }
      if (audio.paused) {
        await audio.play();
      } else {
        audio.pause();
      }
      syncTransportUI();
    } catch (e) {
      setMsg(`播放失败：${e}`, true);
    }
    requestDraw();
  }

  async function decodeAudioForTask(taskId) {
    const token = ++state.audioDecodeToken;
    const url = `/api/tasks/${encodeURIComponent(taskId)}/audio?raw=1&ts=${Date.now()}`;
    try {
      const ctx = await ensureAudioContext();
      await ensureAudioGraph();
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`加载音频失败: ${resp.status}`);
      const buffer = await resp.arrayBuffer();
      const decoded = await ctx.decodeAudioData(buffer.slice(0));
      if (token !== state.audioDecodeToken) return;
      state.audioBuffer = decoded;
      state.audioDurationSec = Number(decoded.duration || 0);
      const normalized = computeNormalization(decoded);
      state.audioNormGain = normalized.audioGain;
      state.waveformNormGain = normalized.waveGain;
      applyAudioGain();
      if (state.audioDurationSec > 0) {
        state.viewStartSec = 0;
        state.viewEndSec = state.audioDurationSec;
      }
      syncTransportUI();
      setMsg(
        `音频已加载，时长 ${fmtSec(state.audioDurationSec)}，音频增益 ${state.audioNormGain.toFixed(2)}x，波形归一化 ${state.waveformNormGain.toFixed(2)}x`
      );
    } catch (e) {
      if (token !== state.audioDecodeToken) return;
      state.audioBuffer = null;
      state.audioDurationSec = 0;
      state.audioNormGain = 1.0;
      state.waveformNormGain = 1.0;
      applyAudioGain();
      syncTransportUI();
      setMsg(`音频波形不可用：${e}`, true);
    }
    requestDraw();
  }

  function getSelectedSentence() {
    const arr = getSentences();
    return arr.find(s => s.sentence_id === state.currentSentenceId) || null;
  }

  function updateEditorBySelected() {
    const s = getSelectedSentence();
    if (!s) {
      el("sentenceId").textContent = "未选择";
      el("origJa").value = "";
      el("origZh").value = "";
      el("editJa").value = "";
      el("editZh").value = "";
      el("editStart").value = "";
      el("editEnd").value = "";
      el("editState").value = "pending";
      return;
    }
    el("sentenceId").textContent = s.sentence_id;
    el("origJa").value = s.ja_text || "";
    el("origZh").value = s.zh_text || "";
    el("editJa").value = s.review_text_ja || "";
    el("editZh").value = s.review_text_zh || "";
    el("editStart").value = Number(s.start_sec || 0).toFixed(3);
    el("editEnd").value = Number(s.end_sec || 0).toFixed(3);
    el("editState").value = s.review_state || "pending";
  }

  function renderSentenceTable() {
    const tbody = el("sentenceBody");
    tbody.innerHTML = "";
    const arr = getSentences();
    for (const s of arr) {
      const tr = document.createElement("tr");
      if (s.sentence_id === state.currentSentenceId) tr.className = "sel";
      const preview = String((s.review_text_zh || s.zh_text || "")).slice(0, 80);
      tr.innerHTML = `
        <td>${fmtSec(s.start_sec)} - ${fmtSec(s.end_sec)}</td>
        <td>
          <div>${s.ja_text || ""}</div>
          <div class="muted">${preview}</div>
        </td>
        <td><span class="status-pill">${s.review_state || "pending"}</span></td>
      `;
      tr.onclick = () => selectSentence(s.sentence_id, {jumpAudio: true});
      tbody.appendChild(tr);
    }
  }

  function renderTaskHeader() {
    if (!state.currentTask) {
      el("taskTitle").textContent = "未选择任务";
      el("taskMeta").textContent = "";
      return;
    }
    const t = state.currentTask;
    el("taskTitle").textContent = `${t.file_id} (${t.task_id})`;
    el("taskMeta").textContent = `状态: ${t.status} | 句子: ${t.sentences.length}`;
    el("taskStatus").value = t.status || "todo";
  }

  function ensureViewWindow() {
    const dur = Number(state.audioDurationSec || 0);
    if (dur <= 0) {
      state.viewStartSec = 0;
      state.viewEndSec = 1;
      return;
    }
    let span = state.viewEndSec - state.viewStartSec;
    if (!(span > 0)) {
      state.viewStartSec = 0;
      state.viewEndSec = dur;
      span = dur;
    }
    span = clamp(span, MIN_VIEW_SPAN_SEC, dur);
    state.viewStartSec = clamp(state.viewStartSec, 0, Math.max(0, dur - span));
    state.viewEndSec = state.viewStartSec + span;
  }

  function buildAnchors(sentences) {
    const anchors = [];
    if (!sentences.length) return anchors;
    const n = sentences.length;
    for (let b = 0; b <= n; b += 1) {
      if (b === 0) {
        anchors.push({
          key: "b-0",
          sec: Number(sentences[0].start_sec || 0),
          refs: [{idx: 0, kind: "start"}],
        });
      } else if (b === n) {
        anchors.push({
          key: `b-${n}`,
          sec: Number(sentences[n - 1].end_sec || 0),
          refs: [{idx: n - 1, kind: "end"}],
        });
      } else {
        const leftSec = Number(sentences[b - 1].end_sec || 0);
        const rightSec = Number(sentences[b].start_sec || 0);
        if (almostEqual(leftSec, rightSec)) {
          anchors.push({
            key: `j-${b}`,
            sec: (leftSec + rightSec) / 2,
            refs: [{idx: b - 1, kind: "end"}, {idx: b, kind: "start"}],
          });
        } else {
          anchors.push({
            key: `e-${b - 1}`,
            sec: leftSec,
            refs: [{idx: b - 1, kind: "end"}],
          });
          anchors.push({
            key: `s-${b}`,
            sec: rightSec,
            refs: [{idx: b, kind: "start"}],
          });
        }
      }
    }
    anchors.sort((a, b) => a.sec - b.sec);
    return anchors;
  }

  function getCanvas() {
    return el("timelineCanvas");
  }

  function getCanvasMetrics() {
    const canvas = getCanvas();
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const w = Math.max(1, Math.floor(rect.width * dpr));
    const h = Math.max(1, Math.floor(rect.height * dpr));
    if (canvas.width !== w || canvas.height !== h || w !== state.lastCanvasW || h !== state.lastCanvasH) {
      canvas.width = w;
      canvas.height = h;
      state.lastCanvasW = w;
      state.lastCanvasH = h;
    }
    return {canvas, rect, dpr, w, h};
  }

  function secToX(sec, rect) {
    const span = Math.max(0.0001, state.viewEndSec - state.viewStartSec);
    return ((sec - state.viewStartSec) / span) * rect.width;
  }

  function xToSec(x, rect) {
    const span = Math.max(0.0001, state.viewEndSec - state.viewStartSec);
    return state.viewStartSec + (x / rect.width) * span;
  }

  function drawWaveform(ctx, rect, dpr) {
    const buffer = state.audioBuffer;
    if (!buffer) {
      ctx.fillStyle = "#6b7c8d";
      ctx.font = `${12 * dpr}px sans-serif`;
      ctx.fillText("波形不可用", 12 * dpr, 20 * dpr);
      return;
    }
    const channels = buffer.numberOfChannels;
    const dataA = buffer.getChannelData(0);
    const dataB = channels > 1 ? buffer.getChannelData(1) : null;
    const sampleRate = buffer.sampleRate;
    const top = 10 * dpr;
    const h = rect.height * dpr - top * 2;
    const mid = top + h / 2;
    const pxCount = Math.max(1, Math.floor(rect.width));
    const startSample = Math.floor(state.viewStartSec * sampleRate);
    const endSample = Math.min(dataA.length, Math.ceil(state.viewEndSec * sampleRate));
    const range = Math.max(1, endSample - startSample);
    const samplesPerPx = Math.max(1, Math.floor(range / pxCount));
    const totalWaveGain = state.waveformNormGain * state.waveformUserGain;

    ctx.strokeStyle = "#2b3b49";
    ctx.lineWidth = 1 * dpr;
    ctx.beginPath();
    ctx.moveTo(0, mid);
    ctx.lineTo(rect.width * dpr, mid);
    ctx.stroke();

    ctx.strokeStyle = "#5a7084";
    ctx.lineWidth = 1 * dpr;
    for (let x = 0; x < pxCount; x += 1) {
      const from = startSample + x * samplesPerPx;
      const to = Math.min(endSample, from + samplesPerPx);
      let peak = 0;
      for (let i = from; i < to; i += 1) {
        let v = Math.abs(dataA[i] || 0);
        if (dataB) v = (v + Math.abs(dataB[i] || 0)) * 0.5;
        if (v > peak) peak = v;
      }
      const scaledPeak = clamp(peak * totalWaveGain, 0, 1.25);
      const hh = scaledPeak * h * 0.9;
      const xx = x * dpr;
      ctx.beginPath();
      ctx.moveTo(xx, mid - hh * 0.5);
      ctx.lineTo(xx, mid + hh * 0.5);
      ctx.stroke();
    }

    ctx.fillStyle = "#8297aa";
    ctx.font = `${11 * dpr}px monospace`;
    ctx.fillText(`${fmtSec(state.viewStartSec)} - ${fmtSec(state.viewEndSec)} / ${fmtSec(state.audioDurationSec)}`, 10 * dpr, (rect.height * dpr) - 8 * dpr);
  }

  function drawAnchors(ctx, rect, dpr, anchors) {
    const sel = getSelectedSentence();
    const selectedIdx = sel ? getSentences().findIndex(s => s.sentence_id === sel.sentence_id) : -1;

    for (const a of anchors) {
      if (a.sec < state.viewStartSec - EPS || a.sec > state.viewEndSec + EPS) continue;
      const x = secToX(a.sec, rect) * dpr;
      const shared = a.refs.length > 1;
      let isSelected = false;
      for (const r of a.refs) {
        if (r.idx === selectedIdx) {
          isSelected = true;
          break;
        }
      }
      ctx.strokeStyle = isSelected ? "#22d3ee" : (shared ? "#14b8a6" : "#fbbf24");
      ctx.lineWidth = (isSelected ? 2.2 : 1.4) * dpr;
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, rect.height * dpr);
      ctx.stroke();
    }
  }

  function drawPlayhead(ctx, rect, dpr) {
    const audio = el("audioPlayer");
    const t = Number(audio.currentTime || 0);
    if (t < state.viewStartSec || t > state.viewEndSec) return;
    const x = secToX(t, rect) * dpr;
    ctx.strokeStyle = "#e5eef8";
    ctx.lineWidth = 1.2 * dpr;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, rect.height * dpr);
    ctx.stroke();
  }

  function drawTimeline() {
    const {rect, dpr, w, h} = getCanvasMetrics();
    const ctx = getCanvas().getContext("2d");
    ensureViewWindow();

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#0c131a";
    ctx.fillRect(0, 0, w, h);

    drawWaveform(ctx, rect, dpr);
    drawAnchors(ctx, rect, dpr, buildAnchors(getSentences()));
    drawPlayhead(ctx, rect, dpr);
    syncTransportUI();
  }

  function requestDraw() {
    if (state.drawRaf) return;
    state.drawRaf = requestAnimationFrame(() => {
      state.drawRaf = 0;
      drawTimeline();
    });
  }

  function seekTo(sec) {
    const audio = el("audioPlayer");
    const dur = Number(state.audioDurationSec || audio.duration || 0);
    if (!(dur > 0)) return;
    audio.currentTime = clamp(sec, 0, dur);
    requestDraw();
  }

  function seekByCanvasClientX(clientX) {
    const rect = getCanvas().getBoundingClientRect();
    const x = clamp(clientX - rect.left, 0, rect.width);
    const sec = xToSec(x, rect);
    seekTo(sec);
  }

  function selectSentence(sentenceId, opts = {}) {
    state.currentSentenceId = sentenceId;
    updateEditorBySelected();
    renderSentenceTable();
    requestDraw();

    if (opts.jumpAudio) {
      const s = getSelectedSentence();
      if (!s) return;
      const audio = el("audioPlayer");
      const wasPlaying = !audio.paused;
      audio.currentTime = Number(s.start_sec || 0);
      if (wasPlaying) {
        audio.play().catch(() => {});
      }
    }
  }

  async function loadTasks() {
    setMsg("加载任务中...");
    const data = await api("/api/tasks");
    state.tasks = data.tasks || [];
    renderTasks();
    setMsg(`任务数: ${state.tasks.length}`);
  }

  async function openTask(taskId) {
    state.currentTaskId = taskId;
    state.currentSentenceId = "";
    setMsg("加载任务详情中...");
    state.currentTask = await api(`/api/tasks/${encodeURIComponent(taskId)}`);
    renderTasks();
    renderTaskHeader();
    renderSentenceTable();
    applyAudioSource(taskId);
    decodeAudioForTask(taskId).catch(e => setMsg(String(e), true));
    if (state.currentTask.sentences && state.currentTask.sentences.length > 0) {
      selectSentence(state.currentTask.sentences[0].sentence_id, {jumpAudio: false});
    } else {
      updateEditorBySelected();
    }
    setMsg(`已打开 ${taskId}`);
  }

  async function saveSentence() {
    if (!state.currentTaskId || !state.currentSentenceId) return;
    const s = getSelectedSentence();
    if (!s) return;

    const startSec = Number(el("editStart").value);
    const endSec = Number(el("editEnd").value);
    if (!Number.isFinite(startSec) || !Number.isFinite(endSec)) {
      setMsg("起止时间格式错误", true);
      return;
    }
    if (startSec < 0 || endSec <= startSec) {
      setMsg("时间非法：需满足 0 <= start < end", true);
      return;
    }
    s.start_sec = startSec;
    s.end_sec = endSec;

    setMsg("保存句子中...");
    const nextTask = await api(`/api/tasks/${encodeURIComponent(state.currentTaskId)}/sentences/${encodeURIComponent(state.currentSentenceId)}`, {
      method: "PATCH",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        review_text_ja: el("editJa").value,
        review_text_zh: el("editZh").value,
        review_state: el("editState").value,
        start_sec: startSec,
        end_sec: endSec,
      }),
    });
    state.currentTask = nextTask;
    renderTaskHeader();
    renderSentenceTable();
    selectSentence(state.currentSentenceId, {jumpAudio: false});
    setMsg("保存成功");
  }

  async function saveTaskStatus() {
    if (!state.currentTaskId) return;
    setMsg("更新任务状态中...");
    const task = await api(`/api/tasks/${encodeURIComponent(state.currentTaskId)}/status`, {
      method: "PATCH",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({status: el("taskStatus").value}),
    });
    state.currentTask = task;
    renderTaskHeader();
    renderTasks();
    setMsg("状态已更新");
  }

  async function exportTask(mode) {
    if (!state.currentTaskId) return;
    setMsg("导出中...");
    const payload = mode === "zh"
      ? {export_ja: false, export_zh: true}
      : {export_ja: true, export_zh: true};
    const data = await api(`/api/tasks/${encodeURIComponent(state.currentTaskId)}/export`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload),
    });
    const files = (data.exported_files || []).join(" | ");
    const warnings = (data.warnings || []).length;
    setMsg(`导出完成: ${files}${warnings ? ` | 警告 ${warnings}` : ""}`);
  }

  function findAnchorAtCanvasX(clientX) {
    const rect = getCanvas().getBoundingClientRect();
    const x = clientX - rect.left;
    const anchors = buildAnchors(getSentences());
    let best = null;
    let bestDist = 1e9;
    for (const a of anchors) {
      const ax = secToX(a.sec, rect);
      const d = Math.abs(ax - x);
      if (d < bestDist) {
        bestDist = d;
        best = a;
      }
    }
    if (!best || bestDist > 10) return null;
    return {anchor: best, rect};
  }

  function applyAnchorSecond(anchor, sec) {
    const arr = getSentences();
    if (!arr.length) return {ok: false, touched: []};
    const oldVals = [];
    const touched = new Set();

    for (const r of anchor.refs) {
      const s = arr[r.idx];
      if (!s) continue;
      touched.add(r.idx);
      if (r.kind === "start") {
        oldVals.push({idx: r.idx, field: "start_sec", val: Number(s.start_sec || 0)});
        s.start_sec = sec;
      } else {
        oldVals.push({idx: r.idx, field: "end_sec", val: Number(s.end_sec || 0)});
        s.end_sec = sec;
      }
    }

    for (const idx of touched) {
      const s = arr[idx];
      if (!s) continue;
      if (!(Number(s.end_sec) > Number(s.start_sec))) {
        for (const o of oldVals) {
          arr[o.idx][o.field] = o.val;
        }
        return {ok: false, touched: []};
      }
      if (Number(s.start_sec) < 0) {
        for (const o of oldVals) {
          arr[o.idx][o.field] = o.val;
        }
        return {ok: false, touched: []};
      }
    }
    return {ok: true, touched: Array.from(touched)};
  }

  async function persistTimeForIndices(indices) {
    if (!state.currentTaskId) return;
    const arr = getSentences();
    for (const idx of indices) {
      const s = arr[idx];
      if (!s) continue;
      await api(`/api/tasks/${encodeURIComponent(state.currentTaskId)}/sentences/${encodeURIComponent(s.sentence_id)}`, {
        method: "PATCH",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          start_sec: Number(s.start_sec),
          end_sec: Number(s.end_sec),
        }),
      });
    }
  }

  function handleCanvasWheel(e) {
    const rect = getCanvas().getBoundingClientRect();
    const x = e.clientX - rect.left;
    const dur = Number(state.audioDurationSec || 0);
    if (dur <= 0) return;
    ensureViewWindow();
    const oldSpan = state.viewEndSec - state.viewStartSec;

    if (e.ctrlKey) {
      e.preventDefault();
      const focusSec = xToSec(x, rect);
      let newSpan = oldSpan * (e.deltaY < 0 ? 0.84 : 1.18);
      newSpan = clamp(newSpan, MIN_VIEW_SPAN_SEC, dur);
      const ratio = x / Math.max(1, rect.width);
      let newStart = focusSec - ratio * newSpan;
      newStart = clamp(newStart, 0, Math.max(0, dur - newSpan));
      state.viewStartSec = newStart;
      state.viewEndSec = newStart + newSpan;
      requestDraw();
      return;
    }

    e.preventDefault();
    const moveSec = (e.deltaY / 500) * oldSpan;
    let ns = state.viewStartSec + moveSec;
    ns = clamp(ns, 0, Math.max(0, dur - oldSpan));
    state.viewStartSec = ns;
    state.viewEndSec = ns + oldSpan;
    requestDraw();
  }

  function handleCanvasMouseDown(e) {
    e.preventDefault();
    const hit = findAnchorAtCanvasX(e.clientX);
    if (!hit) {
      seekByCanvasClientX(e.clientX);
      state.drag = {mode: "seek"};
      return;
    }
    const dur = Number(state.audioDurationSec || 0);
    state.drag = {
      mode: "anchor",
      anchorKey: hit.anchor.key,
      refs: hit.anchor.refs.map(r => ({idx: r.idx, kind: r.kind})),
      startX: e.clientX,
      initialSec: Number(hit.anchor.sec),
      dur,
      touched: [],
      moved: false,
    };
  }

  function handleCanvasMouseMove(e) {
    if (!state.drag) return;
    if (state.drag.mode === "seek") {
      seekByCanvasClientX(e.clientX);
      state.drag.moved = true;
      return;
    }
    const rect = getCanvas().getBoundingClientRect();
    const span = Math.max(0.0001, state.viewEndSec - state.viewStartSec);
    const secPerPx = span / Math.max(1, rect.width);
    const deltaPx = e.clientX - state.drag.startX;
    const deltaSec = deltaPx * secPerPx * DRAG_SENSITIVITY;
    const targetSec = clamp(state.drag.initialSec + deltaSec, 0, Math.max(0, state.drag.dur));

    const anchors = buildAnchors(getSentences());
    const anchor = anchors.find(a => a.key === state.drag.anchorKey);
    if (!anchor) return;
    const res = applyAnchorSecond(anchor, targetSec);
    if (!res.ok) return;
    state.drag.touched = res.touched;
    state.drag.moved = true;
    updateEditorBySelected();
    renderSentenceTable();
    requestDraw();
  }

  async function handleCanvasMouseUp() {
    if (!state.drag) return;
    const drag = state.drag;
    state.drag = null;
    if (drag.mode === "seek") return;
    if (!drag.moved || !drag.touched.length) return;
    try {
      setMsg("正在保存时间戳...");
      await persistTimeForIndices(drag.touched);
      setMsg("时间戳已保存");
    } catch (e) {
      setMsg(`保存时间戳失败：${e}`, true);
    }
  }

  function applyTimeInputsLocally() {
    const s = getSelectedSentence();
    if (!s) return false;
    const startSec = Number(el("editStart").value);
    const endSec = Number(el("editEnd").value);
    if (!Number.isFinite(startSec) || !Number.isFinite(endSec)) {
      setMsg("起止时间格式错误", true);
      return false;
    }
    if (startSec < 0 || endSec <= startSec) {
      setMsg("时间非法：需满足 0 <= start < end", true);
      return false;
    }
    s.start_sec = startSec;
    s.end_sec = endSec;
    renderSentenceTable();
    requestDraw();
    return true;
  }

  async function persistSelectedTime() {
    const s = getSelectedSentence();
    if (!s || !state.currentTaskId) return;
    try {
      setMsg("保存时间戳中...");
      await api(`/api/tasks/${encodeURIComponent(state.currentTaskId)}/sentences/${encodeURIComponent(s.sentence_id)}`, {
        method: "PATCH",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          start_sec: Number(s.start_sec),
          end_sec: Number(s.end_sec),
        }),
      });
      setMsg("时间戳已保存");
    } catch (e) {
      setMsg(`保存时间戳失败：${e}`, true);
    }
  }

  function attachCanvasEvents() {
    const canvas = getCanvas();
    canvas.addEventListener("wheel", handleCanvasWheel, {passive: false});
    canvas.addEventListener("mousedown", handleCanvasMouseDown);
    window.addEventListener("mousemove", handleCanvasMouseMove);
    window.addEventListener("mouseup", () => {
      handleCanvasMouseUp().catch(e => setMsg(String(e), true));
    });
  }

  function startDrawLoop() {
    const audio = el("audioPlayer");
    audio.addEventListener("timeupdate", requestDraw);
    audio.addEventListener("seeked", requestDraw);
    audio.addEventListener("play", requestDraw);
    audio.addEventListener("pause", requestDraw);
    audio.addEventListener("ended", requestDraw);
    setInterval(requestDraw, 80);
  }

  el("refreshTasks").onclick = () => loadTasks().catch(e => setMsg(String(e), true));
  el("taskFilter").oninput = () => renderTasks();
  el("saveSentence").onclick = () => saveSentence().catch(e => setMsg(String(e), true));
  el("saveTaskStatus").onclick = () => saveTaskStatus().catch(e => setMsg(String(e), true));
  el("exportZh").onclick = () => exportTask("zh").catch(e => setMsg(String(e), true));
  el("exportBoth").onclick = () => exportTask("both").catch(e => setMsg(String(e), true));
  el("playPauseBtn").onclick = () => {
    togglePlayPause().catch(e => setMsg(String(e), true));
  };
  el("waveGain").addEventListener("input", () => {
    const v = Number(el("waveGain").value);
    state.waveformUserGain = Number.isFinite(v) ? clamp(v, 0.2, 6.0) : 1.0;
    syncTransportUI();
    requestDraw();
  });

  el("editStart").addEventListener("change", () => {
    if (applyTimeInputsLocally()) {
      persistSelectedTime().catch(e => setMsg(String(e), true));
    }
  });
  el("editEnd").addEventListener("change", () => {
    if (applyTimeInputsLocally()) {
      persistSelectedTime().catch(e => setMsg(String(e), true));
    }
  });

  attachCanvasEvents();
  startDrawLoop();
  syncTransportUI();
  loadTasks().catch(e => setMsg(String(e), true));
</script>
</body>
</html>

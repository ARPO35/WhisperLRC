[asr]
backend = "faster_whisper"
model = "large-v3"
language = "ja"
device = "cuda"
compute_type = "float16"

[pipeline]
input_formats = ["mp3", "wav"]
retry_asr = 3
retry_translate = 5

[translation]
backend = "llm"
target = "zh-Hans"
llm_provider = "openai_compatible"
llm_model = "deepseek-ai/deepseek-v3.2"
llm_base_url = "https://api.siliconflow.cn/v1"
llm_api_key = "sk-ezozekhvgculbauasqarvmuhsseolrfrsxlqmoegyuahuuxc"
llm_prompt_file = "prompt.txt"
llm_preferences_file = "preferences.txt"
llm_batch_size = 10
llm_context_window = 5
timeout_sec = 30

[output]
default_input_dir = "input_audio"
default_output_dir = "output"
json_ext = ".json"
write_lrc = false

[schema]
version = "1.0"

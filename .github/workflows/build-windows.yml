name: build-windows

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Resolve app version
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'
          }
          else {
            $version = '0.0.0-dev.${{ github.run_number }}'
          }
          $version = $version.TrimStart('v')
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install Python dependencies
        run: |
          python -m pip install --prefer-binary --only-binary=:all: --no-compile -r requirements.txt

      - name: Snapshot installed packages
        run: python -m pip list

      - name: Smoke import check
        run: python scripts/ci/check_imports.py

      - name: Build onedir bundle
        run: python -m PyInstaller --clean WhisperLRC.spec

      - name: Stage root resource files
        shell: pwsh
        run: |
          Copy-Item 'prompt.txt' 'dist/WhisperLRC/prompt.txt' -Force
          Copy-Item 'preferences.txt' 'dist/WhisperLRC/preferences.txt' -Force
          Copy-Item 'settings.toml.example' 'dist/WhisperLRC/settings.toml' -Force
          if (Test-Path 'dist/WhisperLRC/settings.toml.example') {
            Remove-Item 'dist/WhisperLRC/settings.toml.example' -Force
          }

      - name: Verify bundle contents
        run: python scripts/ci/verify_dist.py dist/WhisperLRC

      - name: Archive onedir bundle
        shell: pwsh
        run: |
          if (Test-Path 'dist/WhisperLRC-onedir.zip') {
            Remove-Item 'dist/WhisperLRC-onedir.zip' -Force
          }
          Compress-Archive -Path 'dist/WhisperLRC/*' -DestinationPath 'dist/WhisperLRC-onedir.zip'

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found: $iscc"
          }
          $sourceDir = (Resolve-Path 'dist/WhisperLRC').Path
          $outputDir = (Resolve-Path 'dist').Path
          & $iscc "/DMyAppVersion=$env:APP_VERSION" "/DSourceDir=$sourceDir" "/DOutputDir=$outputDir" 'installer.iss'

      - name: Verify installer
        shell: pwsh
        run: |
          if (-not (Test-Path 'dist/WhisperLRC-Setup.exe')) {
            throw 'Installer missing: dist/WhisperLRC-Setup.exe'
          }

      - name: Upload onedir artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperLRC-onedir
          path: dist/WhisperLRC-onedir.zip
          compression-level: 0
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperLRC-setup
          path: dist/WhisperLRC-Setup.exe
          compression-level: 0
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/WhisperLRC-Setup.exe
            dist/WhisperLRC-onedir.zip

